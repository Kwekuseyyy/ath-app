              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, padding: "16px 20px", background: scoreData.passed ? "#f0fdf4" : "#fff7f7", borderRadius: 10, border: `1px solid ${scoreData.passed ? "#bbf7d0" : "#fecaca"}` }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 800, color: scoreData.passed ? "#16a34a" : CRIMSON, lineHeight: 1 }}>{scoreData.overall_score}</div>
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>/ 100</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: scoreData.passed ? "#15803d" : CRIMSON }}>{scoreData.passed ? "Pass ✓" : "Not yet — keep going"}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{scoreData.passed ? `Pass streak: ${consecutivePasses}/3` : "Need 80+ to pass · Streak resets"}</div>
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                {CRITERIA_BP2_DEV.map(c => (
                  <div key={c.key} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: NAVY }}>{c.label}</span>
                      <span style={{ fontSize: 12, color: scoreData[c.key] >= 16 ? "#16a34a" : scoreData[c.key] >= 12 ? "#d97706" : CRIMSON, fontWeight: 700 }}>{scoreData[c.key]}/20</span>
                    </div>
                    <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(scoreData[c.key] / 20) * 100}%`, background: scoreData[c.key] >= 16 ? "#22c55e" : scoreData[c.key] >= 12 ? "#f59e0b" : CRIMSON, borderRadius: 3, transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{c.desc}</div>
                  </div>
                ))}
              </div>

              {[
                { label: "Coaching", text: scoreData.coaching, bg: "#eff6ff", border: "#bfdbfe", color: "#1d4ed8" },
                { label: "Linkage Note", text: scoreData.linkage_note, bg: "#fffbeb", border: "#fde68a", color: "#b45309" },
              ].map((f, i) => (
                <div key={i} style={{ background: f.bg, border: `1px solid ${f.border}`, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: f.color, textTransform: "uppercase", marginBottom: 6 }}>{f.label}</div>
                  <div style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.7 }}>{f.text}</div>
                </div>
              ))}

              <div style={{ background: "#f0fdf4", border: `1px solid #bbf7d0`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#15803d", textTransform: "uppercase", marginBottom: 6 }}>Stronger Development</div>
                <div style={{ fontSize: 13, color: "#14532d", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7, marginBottom: 8 }}>{scoreData.stronger_development}</div>
                <div style={{ fontSize: 11, color: "#166534", borderTop: "1px solid #bbf7d0", paddingTop: 8 }}>{scoreData.stronger_explanation}</div>
              </div>

              {attempts.length > 1 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Attempt History</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {attempts.map((a, i) => (
                      <div key={i} style={{ padding: "4px 10px", borderRadius: 20, background: a.passed ? "#f0fdf4" : "#fff7f7", border: `1px solid ${a.passed ? "#bbf7d0" : "#fecaca"}`, fontSize: 12, fontWeight: 600, color: a.passed ? "#15803d" : CRIMSON }}>
                        #{i + 1} — {a.overall_score}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Try Again</button>
                <button onClick={newPrompt} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New Prompt</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// Filler "prior stage" text for context strips, cycled across all 151 prompts the same way
// SAMPLE_EXAMPLES was derived in the original Development module (index-mapped, read-only here).
function ATHBp2Concession() {
  const { useAuth, useRoster, useModuleProgress, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [concessionType, setConcessionType] = useState(null);
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);
  const [bankOpen, setBankOpen] = useState(false);

  const [timerMode, setTimerMode] = useState("countdown");
  const [timeLeft, setTimeLeft] = useState(90);
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerExpired, setTimerExpired] = useState(false);
  const timerRef = useRef(null);
  const textareaRef = useRef(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "bp2_conc";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const prompt = GRE_PROMPTS[promptIdx];
  const topicSentence = SAMPLE_BP2_TOPIC_SENTENCES[promptIdx];
  const exampleText = SAMPLE_BP2_EXAMPLES[promptIdx];
  const developmentText = SAMPLE_BP2_DEVELOPMENT[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);
  const typeConfig = concessionType ? CONCESSION_TYPES_BP2[concessionType] : null;
  const benchmarkTime = typeConfig ? typeConfig.benchmarkTime : 90;

  useEffect(() => {
    if (!timerRunning) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (timerMode === "countup") return prev + 1;
        if (prev <= 1) { clearInterval(timerRef.current); setTimerExpired(true); setTimerRunning(false); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [timerRunning, timerMode]);

  function startTimer() { setTimerRunning(true); }
  function resetTimer() {
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimeLeft(timerMode === "countup" ? 0 : benchmarkTime);
  }
  function switchTimerMode(mode) {
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimerMode(mode);
    setTimeLeft(mode === "countup" ? 0 : benchmarkTime);
  }

  function handleLogin(r) {
    login(r);
  }

  function selectType(key) {
    setConcessionType(key);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimeLeft(CONCESSION_TYPES_BP2[key].benchmarkTime);
  }

  function changeType() {
    setConcessionType(null);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function insertConnective(phrase) {
    setResponse(r => {
      if (!r) return phrase + " ";
      const needsSpace = !r.endsWith(" ") && !r.endsWith("\n");
      return r + (needsSpace ? " " : "") + phrase + " ";
    });
    if (textareaRef.current) textareaRef.current.focus();
    if (!timerRunning && !timerExpired) startTimer();
  }

  async function handleSubmit() {
    if (!typeConfig) return;
    if (!response.trim() || response.trim().split(/\s+/).length < typeConfig.minWords) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's CONCESSION for Body Paragraph II (the acknowledgment of a counterargument, followed by a rebuttal that returns to the student's position).

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Body Paragraph II Topic Sentence: "${topicSentence}"
Body Paragraph II Example: "${exampleText}"
Body Paragraph II Development: "${developmentText}"

The student selected: ${typeConfig.label}
Structural expectation for this type: ${typeConfig.detail}

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. concession_validity — Does the response acknowledge a genuine, reasonable counterargument (not a strawman or trivial objection)?
2. rebuttal_strength — Does the response decisively return to and reinforce the original position after conceding, rather than leaving the concession unanswered?
3. type_fit — Does the length and structure actually match the selected type? Type 1 should read as a compact closing move (1-2 sentences appended to the paragraph); Type 2 should read as a fully developed, self-contained paragraph with a clear concession-transition-rebuttal arc.
4. connective_language — Are concession/rebuttal signposting phrases used (admittedly, granted, nevertheless, even so, that said…)? This matters for e-rater scoring.
5. language_precision — Is the writing clear, grammatical, and academically precise?

Also provide:
- concession_move_detected: label the dominant move (e.g. "Full Concession + Strong Rebuttal", "Partial Concession", "Concession Without Rebuttal (weak)", "Strawman Concession (weak)", "Rebuttal Without Real Concession (weak)")
- connectives_used: array of the concession/rebuttal connective phrases actually found in the student's text (empty array if none)
- overall_score: sum of all 5 (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text
- rebuttal_note: 1 sentence on how well the rebuttal reinforces the original position, and how to strengthen it
- stronger_concession: a stronger version of the concession for this prompt, type, topic sentence, example, and development
- stronger_explanation: one sentence explaining what makes it stronger

Return ONLY valid JSON, no markdown:
{
  "concession_validity": <0-20>,
  "rebuttal_strength": <0-20>,
  "type_fit": <0-20>,
  "connective_language": <0-20>,
  "language_precision": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "concession_move_detected": "<label>",
  "connectives_used": ["<phrase>", ...],
  "coaching": "<text>",
  "rebuttal_note": "<text>",
  "stronger_concession": "<text>",
  "stronger_explanation": "<text>"
}`;

      const parsed = await scoreResponse(`Score this concession: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

          <div style={{ textAlign: "center", marginBottom: 32 }}>

// Filler "prior stage" text for context strips, cycled across all 151 prompts the same way
// SAMPLE_EXAMPLES was derived in the original Development module (index-mapped, read-only here).
function ATHConclusionThesisReaffirmation() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "conc_reaff";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_CONC_REAFF);

  const prompt = GRE_PROMPTS[promptIdx];
  const thesis = SAMPLE_THESES[promptIdx];
  const bp1TopicSentence = SAMPLE_BP1_TOPIC_SENTENCES[promptIdx];
  const bp2TopicSentence = SAMPLE_BP2_TOPIC_SENTENCES[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);

  function handleLogin(r) {
    login(r);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 15) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's THESIS REAFFIRMATION for the conclusion of an Issue essay.

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Original Thesis: "${thesis}"
Body Paragraph I Topic Sentence: "${bp1TopicSentence}"
Body Paragraph II Topic Sentence: "${bp2TopicSentence}"

The student must restate their thesis to open the conclusion — same position, fresh language, and ideally a light gesture toward how the two body paragraph points support it (without re-listing them in full).

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. position_consistency — Does the restated thesis maintain exactly the same position as the original (not weakened, hedged, or reversed)?
2. paraphrase_quality — Is the thesis restated in genuinely different language, rather than a near word-for-word repeat or single-synonym swap of the original thesis shown above?
3. synthesis_gesture — Does the restatement gesture toward how the two body paragraph points (shown above) support the thesis, without simply re-listing them?
4. language_precision — Is the writing clear, grammatical, and academically precise?
5. closing_tone — Does it read as a confident, natural close rather than a formulaic or abrupt restatement?

Also provide:
- verbatim_overlap: true if the response copies a substantial phrase (5+ consecutive words) directly from the original thesis; false otherwise
- cliche_opener_detected: true if the response opens with a formulaic phrase such as "In conclusion," "In summary," "To conclude," "To sum up," or "In closing"; false otherwise
- overall_score: sum of all 5 (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text. If verbatim_overlap or cliche_opener_detected is true, say so explicitly.
- stronger_reaffirmation: a stronger version of the thesis reaffirmation for this prompt + thesis + both topic sentences
- stronger_explanation: one sentence explaining what makes it stronger

Return ONLY valid JSON, no markdown:
{
  "position_consistency": <0-20>,
  "paraphrase_quality": <0-20>,
  "synthesis_gesture": <0-20>,
  "language_precision": <0-20>,
  "closing_tone": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "verbatim_overlap": <boolean>,
  "cliche_opener_detected": <boolean>,
  "coaching": "<text>",
  "stronger_reaffirmation": "<text>",
  "stronger_explanation": "<text>"
}`;

      const parsed = await scoreResponse(`Score this thesis reaffirmation: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  const timerColor = timerMode === "benchmark" ? (timeLeft < 15 ? CRIMSON : timeLeft < 30 ? "#e07b00" : NAVY) : NAVY;
  const wordCount = response.trim().split(/\s+/).filter(Boolean).length;

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Conclusion</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Thesis Reaffirmation</div>
          </div>

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Try Again</button>
                <button onClick={newPrompt} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New Prompt</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// Filler "prior stage" text for context strips, cycled across all 151 prompts the same way
// SAMPLE_EXAMPLES was derived in the original Development module (index-mapped, read-only here).
function ATHConclusionSynthesis() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "conc_syn";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_CONC_SYN);

  const prompt = GRE_PROMPTS[promptIdx];
  const thesis = SAMPLE_THESES[promptIdx];
  const bp1TopicSentence = SAMPLE_BP1_TOPIC_SENTENCES[promptIdx];
  const bp2TopicSentence = SAMPLE_BP2_TOPIC_SENTENCES[promptIdx];
  const reaffirmation = SAMPLE_REAFFIRMATIONS[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);

  function handleLogin(r) {
    login(r);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 12) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's SYNTHESIS sentence(s) for the conclusion of an Issue essay — the part that ties Body Paragraph I and Body Paragraph II's points together.

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Original Thesis: "${thesis}"
Body Paragraph I Topic Sentence: "${bp1TopicSentence}"
Body Paragraph II Topic Sentence: "${bp2TopicSentence}"
Thesis Reaffirmation (already written, precedes this): "${reaffirmation}"

The student must write 1-2 sentences that explicitly connect the two body paragraph points together — showing how they work in combination (cumulative, complementary, or causal) rather than just listing them side by side or repeating the topic sentences verbatim.

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. integration_quality — Does the sentence explicitly connect both points together, rather than restating each separately?

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "conc_final";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_CONC_FINAL);

  const prompt = GRE_PROMPTS[promptIdx];
  const reaffirmation = SAMPLE_REAFFIRMATIONS[promptIdx];
  const synthesis = SAMPLE_SYNTHESES[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);

  function handleLogin(r) {
    login(r);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 10) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's FINAL THOUGHT — the closing sentence(s) of the conclusion, and of the entire Issue essay.

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Thesis Reaffirmation (already written, precedes this): "${reaffirmation}"
Synthesis (already written, precedes this): "${synthesis}"

The student must close the essay with 1-2 sentences that broaden the significance of the argument (why it matters beyond this specific prompt) WITHOUT introducing new unsupported claims or evidence that should have appeared earlier in the essay.

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. broader_significance — Does it extend the argument to a broader implication, stake, or significance beyond the specific prompt?
2. no_new_claims — Does it avoid introducing new arguments or evidence that should have appeared in the body paragraphs, rather than smuggling in an unsupported new point?
3. natural_close — Does the essay end on a strong, confident final note rather than trailing off or simply repeating the reaffirmation/synthesis shown above?
4. language_precision — Is the writing clear, grammatical, and academically precise?
5. proportionality — Is it appropriately brief (1-2 sentences) rather than over-explaining or introducing a whole new line of argument?

Also provide:
- closing_move_detected: a 2-4 word label naming the type of close (e.g. "Broader Stakes", "Call to Reflection", "Practical Implication", "Mere Restatement (weak)", "New Unsupported Claim (weak)")
- overall_score: sum of all 5 (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text
- stronger_final_thought: a stronger version of the final thought for this prompt, reaffirmation, and synthesis
- stronger_explanation: one sentence explaining what makes it stronger

Return ONLY valid JSON, no markdown:
{
  "broader_significance": <0-20>,
  "no_new_claims": <0-20>,
  "natural_close": <0-20>,
  "language_precision": <0-20>,
  "proportionality": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "closing_move_detected": "<label>",
  "coaching": "<text>",
  "stronger_final_thought": "<text>",
  "stronger_explanation": "<text>"
}`;

      const parsed = await scoreResponse(`Score this final thought: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  const timerColor = timerMode === "benchmark" ? (timeLeft < 15 ? CRIMSON : timeLeft < 30 ? "#e07b00" : NAVY) : NAVY;
  const wordCount = response.trim().split(/\s+/).filter(Boolean).length;

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Conclusion</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Final Thought</div>
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <button onClick={() => setRole("student")} style={{ flex: 1, padding: "12px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Student</button>
            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
          </div>
          {role === "__tutor_pin" && (
            <div>
              <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
                style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif" }}
                onKeyDown={e => e.key === "Enter" && handleLogin("tutor")} />
              {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6 }}>{pinError}</div>}
              <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter as Tutor</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (role && !studentId && !demoMode) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "40px 36px", width: 400, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>Analytical Training Hub</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", textAlign: "center", marginBottom: 20 }}>Who's training?</div>
          {roster.length === 0 ? (
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", lineHeight: 1.6, marginBottom: 16 }}>
              No students on the roster yet. Ask your tutor to add students in the Tutor Dashboard.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16, maxHeight: 280, overflowY: "auto" }}>
              {roster.map(s => (
                <button key={s.id} onClick={() => setStudentId(s.id)} style={{ padding: "10px 14px", background: "#fff", border: `1.5px solid ${BORDER}`, borderRadius: 8, textAlign: "left", fontWeight: 600, fontSize: 13.5, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  {s.name}
                </button>
              ))}
            </div>
          )}
          <button onClick={() => setDemoMode(true)} style={{ width: "100%", padding: "8px 0", background: "none", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Inter, sans-serif", textDecoration: "underline" }}>
            Continue without saving (demo)
          </button>
        </div>
      </div>
    );
  }


  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", display: "flex" }}>
      <div style={{ width: sidebarOpen ? 240 : 0, minWidth: sidebarOpen ? 240 : 0, background: NAVY, color: "#fff", transition: "width 0.25s, min-width 0.25s", overflow: "hidden", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "28px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.10)" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 4 }}>ATH</div>
          <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "Lora, Georgia, serif" }}>Analytical Training Hub</div>
        </div>
        <div style={{ padding: "16px 0", flex: 1 }}>
          {[
            { label: "Introduction", sub: ["Hook ✓", "Shift to Prompt ✓", "Thesis ✓", "Outline ✓"], done: true },
            { label: "Body Paragraph I", sub: ["Topic Sentence ✓", "Example ✓", "Development ✓", "Concession ✓"], done: true },
            { label: "Body Paragraph II", sub: ["Topic Sentence ✓", "Example ✓", "Development ✓", "Concession ✓"], done: true },
            { label: "Conclusion", sub: ["Thesis Reaffirmation ✓", "Synthesis ✓", "Final Thought ←"], done: false },
          ].map((section, i) => (
            <div key={i} style={{ marginBottom: 2 }}>
              <div style={{ padding: "8px 20px", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: section.locked ? "rgba(255,255,255,0.25)" : section.done ? "#7ec8a0" : "rgba(255,255,255,0.9)" }}>
                {section.locked ? "🔒 " : section.done ? "✓ " : ""}{section.label}
              </div>
              {(section.sub || []).map((s, j) => (
                <div key={j} style={{ padding: "5px 20px 5px 32px", fontSize: 12, color: s.includes("←") ? "#fbbf24" : s.includes("✓") ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.35)" }}>
                  {s.replace(" ←", "")}{s.includes("←") && <span style={{ color: "#fbbf24", marginLeft: 4 }}>◀</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div style={{ padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.10)", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>
          {role === "tutor" ? "👤 Tutor" : "👤 Student"}{studentId && !demoMode ? ` — ${(roster.find(s => s.id === studentId) || {}).name || ""}` : demoMode ? " — Demo" : ""}
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <div style={{ background: "#fff", borderBottom: `1px solid ${BORDER}`, padding: "0 24px", height: 52, display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
          <button onClick={() => setSidebarOpen(o => !o)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: NAVY, padding: 4 }}>☰</button>
          <div style={{ fontSize: 12, color: "#64748b" }}>
            <span style={{ color: NAVY, fontWeight: 600 }}>Conclusion</span>
            <span style={{ margin: "0 6px" }}>›</span>
            <span style={{ color: CRIMSON, fontWeight: 600 }}>Final Thought</span>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < consecutivePasses ? "#22c55e" : BORDER, border: `1px solid ${i < consecutivePasses ? "#16a34a" : BORDER}` }} />
              ))}
              <span style={{ fontSize: 11, color: "#64748b", marginLeft: 4 }}>Pass streak</span>
            </div>
            {role === "tutor" && !passed && (
              <button onClick={() => setOverrideMode(true)} style={{ fontSize: 11, padding: "4px 10px", background: "#fff7ed", border: `1px solid #f59e0b`, borderRadius: 5, color: "#b45309", fontWeight: 600, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Override</button>
            )}
          </div>
        </div>

        {overrideMode && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380, boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: NAVY, marginBottom: 12 }}>Tutor Override</div>
              <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Mark this student as having passed the Final Thought gate.</div>
              <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Override note (optional)…" style={{ width: "100%", height: 80, padding: 10, borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 13, resize: "none", boxSizing: "border-box", fontFamily: "Inter, sans-serif" }} />
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button onClick={() => setOverrideMode(false)} style={{ flex: 1, padding: "10px 0", background: "#f1f5f9", border: "none", borderRadius: 7, fontWeight: 600, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Cancel</button>
                <button onClick={tutorOverride} style={{ flex: 1, padding: "10px 0", background: CRIMSON, border: "none", borderRadius: 7, fontWeight: 600, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Confirm Override</button>
              </div>
            </div>
          </div>
        )}

        {passed && (
          <div style={{ background: "#f0fdf4", borderBottom: "2px solid #22c55e", padding: "14px 28px", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 20 }}>✅</span>
            <div>
              <div style={{ fontWeight: 700, color: "#15803d", fontSize: 14 }}>Final Thought — Gate Cleared</div>
              <div style={{ fontSize: 12, color: "#166534" }}>3 consecutive passes at 80%+. The Conclusion is complete — every granular sub-section of the essay has now been trained.</div>
            </div>
            <button onClick={newPrompt} style={{ marginLeft: "auto", padding: "8px 18px", background: NAVY, color: "#fff", border: "none", borderRadius: 7, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Next: Full Essay Mode →</button>
          </div>
        )}

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px", maxWidth: 820, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>

          <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "20px 24px", marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>GRE Issue Prompt</div>
            <div style={{ fontSize: 14, color: NAVY, lineHeight: 1.7, fontFamily: "Lora, Georgia, serif", marginBottom: 12 }}>{prompt}</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.65, borderTop: `1px solid ${BORDER}`, paddingTop: 12 }}>{taskInstruction}</div>
            <button onClick={newPrompt} style={{ marginTop: 12, fontSize: 11, padding: "4px 10px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 5, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New prompt ↺</button>
          </div>

          <div style={{ background: "#fffbeb", border: `1px solid #fde68a`, borderRadius: 10, padding: "14px 20px", marginBottom: 12 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#92400e", textTransform: "uppercase", marginBottom: 6 }}>Thesis Reaffirmation (from Conclusion — Thesis Reaffirmation)</div>
            <div style={{ fontSize: 13, color: "#78350f", fontFamily: "Lora, Georgia, serif", lineHeight: 1.6 }}>{reaffirmation}</div>
          </div>

          <div style={{ background: "#f5f3ff", border: `1px solid #ddd6fe`, borderRadius: 10, padding: "14px 20px", marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#6d28d9", textTransform: "uppercase", marginBottom: 6 }}>Synthesis (from Conclusion — Synthesis)</div>
            <div style={{ fontSize: 13, color: "#4c1d95", fontFamily: "Lora, Georgia, serif", lineHeight: 1.65 }}>{synthesis}</div>
          </div>

          {!submitted && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 4 }}>Write your final thought</div>
              <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.6 }}>
                In 1-2 sentences, close the essay by pointing to why this argument matters more broadly — without introducing any new claims or evidence that should have appeared earlier in the essay.
              </div>
            </div>
          )}

          {!submitted && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: timerColor, fontVariantNumeric: "tabular-nums", minWidth: 72 }}>{formatTime(timeLeft)}</div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={startTimer} disabled={timerRunning} style={{ fontSize: 11, padding: "4px 10px", background: timerRunning ? "#f1f5f9" : NAVY, color: timerRunning ? "#94a3b8" : "#fff", border: "none", borderRadius: 5, cursor: timerRunning ? "default" : "pointer", fontFamily: "Inter, sans-serif" }}>Start</button>
                <button onClick={resetTimer} style={{ fontSize: 11, padding: "4px 10px", background: "#f1f5f9", border: `1px solid ${BORDER}`, borderRadius: 5, cursor: "pointer", color: "#64748b", fontFamily: "Inter, sans-serif" }}>Reset</button>
              </div>
              {role === "tutor" && (
                <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>
                  {["countdown", "countup", "benchmark"].map(m => (
                    <button key={m} onClick={() => switchTimerMode(m)} style={{ fontSize: 10, padding: "3px 8px", background: timerMode === m ? NAVY : "#fff", color: timerMode === m ? "#fff" : "#64748b", border: `1px solid ${BORDER}`, borderRadius: 4, cursor: "pointer", fontFamily: "Inter, sans-serif", textTransform: "capitalize" }}>{m}</button>
                  ))}
                </div>
              )}
              {timerExpired && <span style={{ fontSize: 11, color: CRIMSON, fontWeight: 600 }}>Time's up</span>}
            </div>
          )}

          {!submitted ? (
            <div>
              <textarea value={response} onChange={e => setResponse(e.target.value)}
                placeholder="More broadly, this suggests… / What this ultimately reveals is…"
                style={{ width: "100%", height: 100, padding: "14px 16px", borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 14, lineHeight: 1.75, resize: "none", boxSizing: "border-box", fontFamily: "Lora, Georgia, serif", color: "#1e293b", outline: "none" }}
                onFocus={e => { if (!timerRunning && !timerExpired) startTimer(); e.target.style.borderColor = NAVY; }}
                onBlur={e => e.target.style.borderColor = BORDER} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>{wordCount} words</div>
                <button onClick={handleSubmit} disabled={wordCount < 10}
                  style={{ padding: "10px 28px", background: wordCount >= 10 ? CRIMSON : "#e2e8f0", color: wordCount >= 10 ? "#fff" : "#94a3b8", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: wordCount >= 10 ? "pointer" : "default", fontFamily: "Inter, sans-serif" }}>
                  Score →
                </button>
              </div>
            </div>
          ) : scoring ? (
            <div style={{ padding: "32px 0", textAlign: "center", color: "#64748b", fontSize: 13 }}>
              <div style={{ fontSize: 24, marginBottom: 12 }}>⏳</div>
              Scoring your final thought…
            </div>
          ) : scoreData?.error ? (
            <div style={{ padding: 20, color: CRIMSON, fontSize: 13 }}>Scoring failed. <button onClick={tryAgain} style={{ color: NAVY, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Try again</button></div>
          ) : scoreData && (
            <div>
              <div style={{ background: "#f8fafc", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 6 }}>Your final thought · {scoreData.closing_move_detected}</div>
                <div style={{ fontSize: 14, color: "#1e293b", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7 }}>{response}</div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, padding: "16px 20px", background: scoreData.passed ? "#f0fdf4" : "#fff7f7", borderRadius: 10, border: `1px solid ${scoreData.passed ? "#bbf7d0" : "#fecaca"}` }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 800, color: scoreData.passed ? "#16a34a" : CRIMSON, lineHeight: 1 }}>{scoreData.overall_score}</div>
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>/ 100</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: scoreData.passed ? "#15803d" : CRIMSON }}>{scoreData.passed ? "Pass ✓" : "Not yet — keep going"}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{scoreData.passed ? `Pass streak: ${consecutivePasses}/3` : "Need 80+ to pass · Streak resets"}</div>
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                {CRITERIA_CONC_FINAL.map(c => (
                  <div key={c.key} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: NAVY }}>{c.label}</span>
                      <span style={{ fontSize: 12, color: scoreData[c.key] >= 16 ? "#16a34a" : scoreData[c.key] >= 12 ? "#d97706" : CRIMSON, fontWeight: 700 }}>{scoreData[c.key]}/20</span>
                    </div>
                    <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(scoreData[c.key] / 20) * 100}%`, background: scoreData[c.key] >= 16 ? "#22c55e" : scoreData[c.key] >= 12 ? "#f59e0b" : CRIMSON, borderRadius: 3, transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{c.desc}</div>
                  </div>
                ))}
              </div>

              <div style={{ background: "#eff6ff", border: `1px solid #bfdbfe`, borderRadius: 8, padding: "14px 18px", marginBottom: 16 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#1d4ed8", textTransform: "uppercase", marginBottom: 6 }}>Coaching</div>
                <div style={{ fontSize: 13, color: "#1e3a5f", lineHeight: 1.7 }}>{scoreData.coaching}</div>
              </div>

              <div style={{ background: "#f0fdf4", border: `1px solid #bbf7d0`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#15803d", textTransform: "uppercase", marginBottom: 6 }}>Stronger Final Thought</div>
                <div style={{ fontSize: 13, color: "#14532d", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7, marginBottom: 8 }}>{scoreData.stronger_final_thought}</div>
                <div style={{ fontSize: 11, color: "#166534", borderTop: "1px solid #bbf7d0", paddingTop: 8 }}>{scoreData.stronger_explanation}</div>
              </div>

              {attempts.length > 1 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Attempt History</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {attempts.map((a, i) => (
                      <div key={i} style={{ padding: "4px 10px", borderRadius: 20, background: a.passed ? "#f0fdf4" : "#fff7f7", border: `1px solid ${a.passed ? "#bbf7d0" : "#fecaca"}`, fontSize: 12, fontWeight: 600, color: a.passed ? "#15803d" : CRIMSON }}>
                        #{i + 1} — {a.overall_score}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Try Again</button>
                <button onClick={newPrompt} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New Prompt</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


function ATHFullEssayMode() {
  const { useAuth, useRoster, getProgress, setProgress, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [minutes, setMinutes] = useState(DEFAULT_MINUTES);
  const [testStarted, setTestStarted] = useState(false);
  const [essayText, setEssayText] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);
  const [attempts, setAttempts] = useState([]);

  // --- roster / persistence ---
  const MODULE_KEY = "full_essay";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();

  useEffect(() => {
    if (!studentId || demoMode) return;
    let cancelled = false;
    (async () => {
      const data = await getProgress(studentId, MODULE_KEY);
      if (!cancelled && data) setAttempts(data.attempts || []);
    })();
    return () => { cancelled = true; };
  }, [studentId, demoMode]);

  async function persistProgress(newAttemptsList) {
    if (!studentId || demoMode) return;
    await setProgress(studentId, MODULE_KEY, { attempts: newAttemptsList });
  }

  const [timeLeft, setTimeLeft] = useState(DEFAULT_MINUTES * 60);
  const timerRef = useRef(null);
  const textareaRef = useRef(null);
  const essayTextRef = useRef("");

  const prompt = GRE_PROMPTS[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);
  const wordCount = essayText.trim() ? essayText.trim().split(/\s+/).filter(Boolean).length : 0;

  useEffect(() => { essayTextRef.current = essayText; }, [essayText]);

  useEffect(() => {
    if (!testStarted || submitted) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (prev <= 1) {
          clearInterval(timerRef.current);
          handleSubmit(true);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [testStarted, submitted]);

  function handleLogin(r) {
    login(r);
  }

  function shufflePrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
  }

  function startTest() {
    setTimeLeft(minutes * 60);
    setTestStarted(true);
  }

  async function handleSubmit(auto) {
    if (submitted) return;
    clearInterval(timerRef.current);
    setSubmitted(true);
    setScoring(true);

    const finalText = essayTextRef.current;
    const finalWordCount = finalText.trim() ? finalText.trim().split(/\s+/).filter(Boolean).length : 0;

    if (!finalText.trim()) {
      setScoreData({ empty: true });
      setScoring(false);
      return;
    }

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach giving a HOLISTIC score to a complete, timed GRE Issue essay, written under real test-like conditions (${minutes} minutes allotted, ${auto ? "time expired and the essay was auto-submitted" : "the student submitted early"}).

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Word count: ${finalWordCount} (target: ${TARGET_WORD_COUNT}+ words, since e-rater scoring rewards length)

This program trains students toward e-rater-optimized writing: 750+ words, strict five-paragraph structure (Introduction, Body Paragraph I, Body Paragraph II, Conclusion), a concession/rebuttal in at least one body paragraph, heavy use of connective/transitional language, and long, grammatically controlled sentences.

Score the essay on exactly these 5 traits, each out of 20 (total = 100):
1. thesis_position — Is there a clear, arguable thesis stating a position, maintained consistently throughout?
2. development_support — Are both body paragraphs supported with specific, relevant examples that are genuinely analyzed (not just described)?
3. structure_organization — Does the essay follow a clear five-paragraph structure with topic sentences, a concession, and logical progression?
4. language_connectives — Is the writing grammatically controlled, with varied sentence structure and e-rater-friendly connective/transitional language used throughout?
5. overall_coherence — Does the essay read as a unified whole, closing with a conclusion that reaffirms and extends the argument rather than just repeating it?

Also provide:
- overall_score: sum of all 5 traits (0-100)
- gre_scaled_score: convert overall_score to the official GRE Issue task 0-6 holistic scale (in 0.5 increments), following typical ETS band descriptions (6 = outstanding, 5 = strong, 4 = adequate, 3 = limited, 2 = seriously flawed, 1 = fundamentally deficient, 0 = off-topic/blank)
- has_five_paragraphs: boolean, true if the essay is organized into a clear introduction, two body paragraphs, and a conclusion
- has_clear_thesis: boolean
- has_concession: boolean, true if at least one body paragraph acknowledges and rebuts a counterargument
- meets_word_target: boolean, true if word count is at or above ${TARGET_WORD_COUNT}
- connective_density_adequate: boolean, true if connective/transitional phrases appear regularly (roughly one or more per paragraph)
- strengths: array of 2-4 short phrases (3-8 words each) naming specific things the essay does well
- areas_to_improve: array of 2-4 short phrases (3-8 words each) naming specific, actionable improvements
- coaching: 3-5 sentences of holistic, specific feedback referencing the actual essay, written as a tutor would after a mock test

Return ONLY valid JSON, no markdown:
{
  "thesis_position": <0-20>,
  "development_support": <0-20>,
  "structure_organization": <0-20>,
  "language_connectives": <0-20>,
  "overall_coherence": <0-20>,
  "overall_score": <0-100>,
  "gre_scaled_score": <0-6, 0.5 increments>,
  "has_five_paragraphs": <boolean>,
  "has_clear_thesis": <boolean>,
  "has_concession": <boolean>,
  "meets_word_target": <boolean>,
  "connective_density_adequate": <boolean>,
  "strengths": ["<phrase>", ...],
  "areas_to_improve": ["<phrase>", ...],
  "coaching": "<text>"
}`;

      const parsed = await scoreResponse(`Score this complete essay:\n\n${finalText}`, systemPrompt);
      const newAttempts = [...attempts, { ...parsed, wordCount: finalWordCount, minutes, timestamp: new Date().toISOString() }];
      persistProgress(newAttempts);
      setAttempts(newAttempts);
      setScoreData({ ...parsed, wordCount: finalWordCount });
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function writeAnother() {
    shufflePrompt();
    setMinutes(DEFAULT_MINUTES);
    setTestStarted(false);
    setEssayText("");
    setSubmitted(false);
    setScoreData(null);
    setTimeLeft(DEFAULT_MINUTES * 60);
    clearInterval(timerRef.current);
  }

  const timerColor = timeLeft <= 60 ? CRIMSON : timeLeft <= 300 ? "#e07b00" : NAVY;

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Full Essay Mode</div>

          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>

            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
          </div>
          {role === "__tutor_pin" && (

  );

function fmtTimerIntro(s) {
  const m = Math.floor(Math.abs(s) / 60), sc = Math.abs(s) % 60;
  return `${m}:${sc.toString().padStart(2, "0")}`;
}

const BENCHMARK_TIME_HOOK = 150;
const MODULE_KEY_HOOK = "hook";

function ATHHook() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, useTopicRotation, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();

  const { topic, newTopic: rotateTopic } = useTopicRotation(HOOK_TOPICS);
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const { consecutivePasses, passed, attempts, best, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY_HOOK, demoMode, { trackBest: true });

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_HOOK);

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  function handleLogin(r) {
    login(r);
  }

  function newTopic() {
    rotateTopic();
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 4) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const promptText = `You are a GRE Analytical Writing scorer combining e-rater and trained human reader criteria. Score the following hook for a GRE Issue Essay.

TOPIC: "${topic.s}"
STUDENT'S HOOK: "${response}"

INSTRUCTIONS:
- Detect the hook type used (Generalisation, Anecdote, Interesting fact/claim, Trend, or Quote). If it blends types name the dominant one.
- Factual accuracy is NOT penalised — GRE does not fact-check. Relevance and plausibility matter.
- Reward: long, well-constructed sentences; strong connective language; vivid relevant opening; absence of thesis statement.
- Penalise: stating the thesis; being off-topic; being too vague or generic with no connection to the topic; very short hooks (1-5 words).

Score each criterion 0-100:
1. RELEVANCE (30%) — Does it relate to the topic without stating the thesis?
2. ENGAGEMENT (25%) — Is it compelling and thought-provoking?
3. HOOK TYPE EFFECTIVENESS (20%) — Is the detected type executed well?
4. LANGUAGE QUALITY (15%) — Vocabulary, sentence length, connectives, variety.
5. APPROPRIATENESS (10%) — Academic tone, no personal thesis yet.

Weighted overall = (rel*0.30)+(eng*0.25)+(type*0.20)+(lang*0.15)+(app*0.10), round to integer.

Return ONLY valid JSON, no markdown fences:
{
  "overall": <integer 0-100>,
  "pass": <true if overall>=80>,
  "hookType": "<detected type name>",
  "criteria": {"relevance":<int>,"engagement":<int>,"hookTypeEffectiveness":<int>,"languageQuality":<int>,"appropriateness":<int>},
  "detailedFeedback": "<2-3 sentences of specific clinical coaching. Reference the student's actual words.>",
  "hookTypeAssessment": "<1-2 sentences on how well they executed the detected hook type. Mention if factual claims are unverifiable but acceptable.>",
  "strongerExample": "<A strong 1-3 sentence hook of the same type for this exact topic. Make it genuinely impressive.>",
  "strongerExampleExplain": "<1 sentence explaining what makes it strong.>"
}`;

      const parsed = await scoreResponse(promptText);

const BENCHMARK_TIME_SHIFT = 45;
const MODULE_KEY_SHIFT = "shift";

async function generateHook(topicStatement) {
  try {
    const parsed = await window.ATHCore.scoreResponse(`For this GRE Issue Essay topic: "${topicStatement}"
Generate a strong hook (1-2 sentences, generalisation or trend) that an essay could open with.
Return ONLY valid JSON: {"hook":"<hook text>"}`);
    return parsed.hook;
  } catch (e) {
    return "Throughout history, the way societies organise themselves has determined whether they flourish or falter, with the values instilled in each generation proving especially consequential.";
  }
}

function ATHShiftToPrompt() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, useTopicRotation, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();

  const { topic, newTopic: rotateTopic } = useTopicRotation(SHIFT_TOPICS);
  const [currentHook, setCurrentHook] = useState("Loading…");
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY_SHIFT, demoMode);

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_SHIFT);

  useEffect(() => {
    generateHook(topic.s).then(setCurrentHook);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  function handleLogin(r) {
    login(r);
  }

  async function newTopic() {

STUDENT'S SHIFT TO PROMPT: "${response}"

The "Shift to Prompt" must:
1. Bridge smoothly from the hook to the specific topic
2. Narrow the focus from the hook's general opening toward the issue
3. NOT state the thesis or personal position yet
4. Create cohesion — the reader should feel a natural flow from hook → shift → (upcoming thesis)
5. Reference or echo key language from the topic naturally
6. Be 1-2 sentences

Score each criterion 0-100:
1. BRIDGE QUALITY (35%) — Does it smoothly connect the hook to the topic without being abrupt?
2. FOCUS NARROWING (25%) — Does it successfully narrow from general to specific?
3. THESIS AVOIDANCE (20%) — Does it avoid stating a position? (penalise heavily if thesis is stated here)
4. LANGUAGE QUALITY (20%) — Connective language, sentence quality, flow

async function generateContext(topicStatement) {
  try {
    return await window.ATHCore.scoreResponse(`For this GRE Issue Essay topic: "${topicStatement}"
Generate:
1. A strong hook (1-2 sentences, generalisation or trend)
2. A shift to prompt (1 sentence bridging hook to topic)

Return ONLY valid JSON: {"hook":"<hook text>","shift":"<shift text>"}`);
  } catch (e) {
    return {
      hook: "Throughout history, the way societies organise themselves has determined whether they flourish or falter, with the values instilled in each generation proving especially consequential.",
      shift: "This enduring tension between competing ideals is precisely what this issue invites us to examine."
    };
  }
}

  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, useTopicRotation, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();

  const { topic, newTopic: rotateTopic } = useTopicRotation(THESIS_TOPICS);
  const [currentHook, setCurrentHook] = useState("Loading…");
  const [currentShift, setCurrentShift] = useState("Loading…");
  const [specIdx, setSpecIdx] = useState(-1);
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY_THESIS, demoMode);

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_THESIS);

  useEffect(() => {
    generateContext(topic.s).then(ctx => { setCurrentHook(ctx.hook); setCurrentShift(ctx.shift); });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  function handleLogin(r) {
    login(r);
  }

  async function newTopic() {
    const newT = rotateTopic();
    setCurrentHook("Generating…");
    setCurrentShift("Generating…");
    setSpecIdx(-1);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
    const ctx = await generateContext(newT.s);
    setCurrentHook(ctx.hook);
    setCurrentShift(ctx.shift);
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 5 || specIdx < 0) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const promptText = `You are a GRE Analytical Writing scorer evaluating a thesis statement for a GRE Issue Essay.

TOPIC: "${topic.s}"
TASK INSTRUCTION: "${topic.t}"
HOOK (already written): "${currentHook}"
SHIFT TO PROMPT (already written): "${currentShift}"
STUDENT'S DECLARED POSITION: ${SPECTRUM[specIdx].label}
STUDENT'S THESIS: "${response}"

SCORING CRITERIA_THESIS:
1. POSITION CLARITY (30%) — Is there a clear, arguable stance? Reward "mostly agree/disagree". Penalise neutral/fence-sitting heavily (if position is neutral, cap this at 40). Penalise if no clear position is detectable.
2. TASK RESPONSIVENESS (25%) — Does the thesis directly address the specific task instruction (agree/disagree, recommend/not, etc.)?
3. NUANCE & SOPHISTICATION (20%) — Does it acknowledge complexity without abandoning a position? Qualifying language ("while X, ultimately Y") scores highly.
4. FLOW WITH INTRODUCTION (15%) — Does it feel like a natural conclusion to the hook and shift? Does it feel like the boss of the essay?
5. LANGUAGE QUALITY (10%) — Sentence quality, precision, GRE-appropriate vocabulary.

Detect the actual position from the thesis text itself (may differ from declared).
Spectrum positions: 0=Strongly disagree, 1=Mostly disagree, 2=Neutral, 3=Mostly agree, 4=Strongly agree.

Return ONLY valid JSON, no markdown:
{
  "overall": <integer 0-100>,
  "pass": <true if overall>=80>,
  "detectedPositionIdx": <0-4>,
  "detectedPositionLabel": "<label>",
  "positionMatchesDeclared": <true/false>,
  "criteria": {"positionClarity":<int>,"taskResponsiveness":<int>,"nuance":<int>,"flow":<int>,"languageQuality":<int>},
  "detailedFeedback": "<2-4 sentences of specific clinical coaching. Reference the student's actual words. Be direct.>",
  "spectrumAnalysis": "<1-2 sentences on whether the position is optimal for GRE scoring and why.>",
  "flowAssessment": "<1 sentence on how well hook, shift, and thesis work as a unit.>",
  "strongerExample": "<Write a strong thesis for this exact topic that takes a 'mostly agree' or 'mostly disagree' position with qualifying language. 1-2 sentences.>",
  "strongerExampleExplain": "<1 sentence on what makes it effective.>"
}`;

      const parsed = await scoreResponse(promptText);
      setScoreData(parsed);
      recordAttempt({ ...parsed, declaredPosition: SPECTRUM[specIdx].label }, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    newTopic();
  }

  const timerColor = timeLeft <= 15 && timerMode !== "countup" ? CRIMSON : NAVY;
  const wordCount = response.trim() ? response.trim().split(/\s+/).filter(Boolean).length : 0;

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Introduction</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Thesis</div>
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <button onClick={() => setRole("student")} style={{ flex: 1, padding: "12px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Student</button>
            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
          </div>
          {role === "__tutor_pin" && (
            <div>
              <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
                style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif" }}
                onKeyDown={e => e.key === "Enter" && handleLogin("tutor")} />
              {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6 }}>{pinError}</div>}
              <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter as Tutor</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (role && !studentId && !demoMode) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "40px 36px", width: 400, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>Analytical Training Hub</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", textAlign: "center", marginBottom: 20 }}>Who's training?</div>
          {roster.length === 0 ? (
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", lineHeight: 1.6, marginBottom: 16 }}>
              No students on the roster yet. Ask your tutor to add students in the Tutor Dashboard.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16, maxHeight: 280, overflowY: "auto" }}>
              {roster.map(s => (
                <button key={s.id} onClick={() => setStudentId(s.id)} style={{ padding: "10px 14px", background: "#fff", border: `1.5px solid ${BORDER}`, borderRadius: 8, textAlign: "left", fontWeight: 600, fontSize: 13.5, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  {s.name}
                </button>
              ))}
            </div>
          )}
          <button onClick={() => setDemoMode(true)} style={{ width: "100%", padding: "8px 0", background: "none", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Inter, sans-serif", textDecoration: "underline" }}>
            Continue without saving (demo)
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", display: "flex" }}>
      <div style={{ width: sidebarOpen ? 240 : 0, minWidth: sidebarOpen ? 240 : 0, background: NAVY, color: "#fff", transition: "width 0.25s, min-width 0.25s", overflow: "hidden", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "28px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.10)" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 4 }}>ATH</div>
          <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "Lora, Georgia, serif" }}>Analytical Training Hub</div>
        </div>
        <div style={{ padding: "16px 0", flex: 1 }}>
          <div style={{ padding: "8px 20px", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "rgba(255,255,255,0.9)" }}>Introduction</div>
          {["Hook ✓", "Shift to Prompt ✓", "Thesis ←", "Outline"].map((s, j) => (
            <div key={j} style={{ padding: "5px 20px 5px 32px", fontSize: 12, color: s.includes("←") ? "#fbbf24" : s.includes("✓") ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.35)" }}>
              {s.replace(" ←", "")}{s.includes("←") && <span style={{ color: "#fbbf24", marginLeft: 4 }}>◀</span>}
            </div>
          ))}
        </div>
        <div style={{ padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.10)", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>
          {role === "tutor" ? "👤 Tutor" : "👤 Student"}{studentId && !demoMode ? ` — ${(roster.find(s => s.id === studentId) || {}).name || ""}` : demoMode ? " — Demo" : ""}
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <div style={{ background: "#fff", borderBottom: `1px solid ${BORDER}`, padding: "0 24px", height: 52, display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
          <button onClick={() => setSidebarOpen(o => !o)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: NAVY, padding: 4 }}>☰</button>
          <div style={{ fontSize: 12, color: "#64748b" }}>
            <span style={{ color: NAVY, fontWeight: 600 }}>Introduction</span>
            <span style={{ margin: "0 6px" }}>›</span>
            <span style={{ color: CRIMSON, fontWeight: 600 }}>Thesis</span>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 5 }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < consecutivePasses ? "#22c55e" : BORDER, border: `1px solid ${i < consecutivePasses ? "#16a34a" : BORDER}` }} />
            ))}
            <span style={{ fontSize: 11, color: "#64748b", marginLeft: 4 }}>Pass streak</span>
            {role === "tutor" && !passed && (
              <button onClick={() => setOverrideMode(true)} style={{ fontSize: 11, padding: "4px 10px", background: "#fff7ed", border: "1px solid #f59e0b", borderRadius: 5, color: "#b45309", fontWeight: 600, cursor: "pointer", marginLeft: 10, fontFamily: "Inter, sans-serif" }}>Override</button>
            )}
          </div>
        </div>

        {overrideMode && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380, boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: NAVY, marginBottom: 12 }}>Tutor Override</div>
              <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Mark this student as having passed this gate.</div>
              <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Override note (optional)…" style={{ width: "100%", height: 80, padding: 10, borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 13, resize: "none", boxSizing: "border-box", fontFamily: "Inter, sans-serif" }} />
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button onClick={() => setOverrideMode(false)} style={{ flex: 1, padding: "10px 0", background: "#f1f5f9", border: "none", borderRadius: 7, fontWeight: 600, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Cancel</button>
                <button onClick={tutorOverride} style={{ flex: 1, padding: "10px 0", background: CRIMSON, border: "none", borderRadius: 7, fontWeight: 600, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Confirm Override</button>
              </div>
            </div>
          </div>
        )}

        {passed && (
          <div style={{ background: "#f0fdf4", borderBottom: "2px solid #22c55e", padding: "14px 28px", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 20 }}>✅</span>
            <div>
              <div style={{ fontWeight: 700, color: "#15803d", fontSize: 14 }}>Thesis — Mastered</div>
              <div style={{ fontSize: 12, color: "#166534" }}>3 consecutive passes at 80%+. Proceed to Outline.</div>
            </div>
            <button onClick={newTopic} style={{ marginLeft: "auto", padding: "8px 18px", background: NAVY, color: "#fff", border: "none", borderRadius: 7, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Next: Outline →</button>
          </div>
        )}

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px", maxWidth: 820, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>

          <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "20px 24px", marginBottom: 12 }}>

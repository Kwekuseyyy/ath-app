            <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 2, textTransform: "uppercase", color: "#ffd6de", marginBottom: 5 }}>Continue where you left off</div>
            <div style={{ fontSize: 19, fontWeight: 900 }}>{continueModule.label} →</div>
          </button>
        ) : (
          <div style={{ padding: "20px 24px", background: "#f0fdf4", border: "2.5px solid #bbf7d0", borderRadius: 12, marginBottom: 32 }}>
            <div style={{ fontSize: 16, fontWeight: 900, color: "#15803d" }}>🎉 All modules passed!</div>
            <div style={{ fontSize: 12, color: "#166534", marginTop: 3, fontWeight: 600 }}>Revisit any module below any time, or try Full Essay Mode for a complete timed run.</div>
          </div>
        )}

        {allGroups.map((group, gi) => (
          <div key={gi} style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 2, color: NAVY, textTransform: "uppercase", marginBottom: 12, paddingLeft: 10, borderLeft: `4px solid ${CRIMSON}` }}>
              {group.label}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 10 }}>
              {group.modules.map(m => {
                const st = statusFor(m.key);
                const badge = STATUS_BADGE[st];
                return (
                  <button
                    key={m.key}
                    onClick={() => setActiveKey(m.key)}
                    style={{
                      textAlign: "left", padding: "16px 18px", background: "#fff",
                      border: `2.5px solid ${st === "passed" ? "#bbf7d0" : BORDER}`, borderRadius: 10, cursor: "pointer",
                      fontFamily: "Inter, sans-serif",
                    }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = NAVY}
                    onMouseLeave={e => e.currentTarget.style.borderColor = (st === "passed" ? "#bbf7d0" : BORDER)}
                  >
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <span style={{ fontWeight: 800, fontSize: 14, color: NAVY }}>{m.label}</span>
                      <span style={{ fontSize: 15 }}>{badge.icon}</span>
                    </div>
                    <div style={{ fontSize: 11, color: badge.color, marginTop: 5, fontWeight: 800 }}>{badge.label}</div>
                  </button>
                );
              })}
            </div>
          </div>
        ))}

        {role === "tutor" && (
          <button onClick={() => setActiveKey("tutor_dashboard")} style={{ marginTop: 8, padding: "13px 22px", background: CRIMSON, border: "none", borderRadius: 10, fontWeight: 900, fontSize: 14, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
            Open Tutor Dashboard →
          </button>
        )}
      </div>
    </div>
  );
}


function ATHTestHarness() {
  const [activeKey, setActiveKey] = useState(null);

  if (activeKey) {
    const all = MODULE_GROUPS.flatMap(g => g.modules);
    const found = all.find(m => m.key === activeKey);
    const ActiveComponent = found.Component;
    return (
      <div style={{ position: "relative", minHeight: "100vh" }}>
        <button
          onClick={() => setActiveKey(null)}
          style={{
            position: "fixed", top: 10, right: 10, zIndex: 1000,
            padding: "8px 16px", background: NAVY, color: "#fff", border: "none",
            borderRadius: 8, fontWeight: 700, fontSize: 12, cursor: "pointer",
            fontFamily: "Inter, sans-serif", boxShadow: "0 2px 10px rgba(0,0,0,0.25)"
          }}
        >
          ← Back to Module List
        </button>
        <ActiveComponent key={activeKey} />
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", padding: "40px 24px" }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: 36 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>
            Analytical Training Hub — Test Harness
          </div>
          <div style={{ fontSize: 26, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>
            Pick a module to try
          </div>
          <div style={{ fontSize: 13, color: "#64748b", marginTop: 8 }}>
            Every module below is fully independent — its own login, timer, scoring, and gate — combined here purely so you can test-run the whole build in one place.
          </div>
        </div>

        {MODULE_GROUPS.map((group, gi) => (
          <div key={gi} style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 10 }}>
              {group.label}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 10 }}>
              {group.modules.map(m => (
                <button
                  key={m.key}
                  onClick={() => setActiveKey(m.key)}
                  style={{
                    textAlign: "left", padding: "16px 18px", background: "#fff",
                    border: `1.5px solid ${BORDER}`, borderRadius: 10, cursor: "pointer",
                    fontFamily: "Inter, sans-serif", fontWeight: 600, fontSize: 13.5, color: NAVY,
                  }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = NAVY}
                  onMouseLeave={e => e.currentTarget.style.borderColor = BORDER}
                >
                  {m.label} →
                </button>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<ATHDashboard />);
</script>
</body>
</html>

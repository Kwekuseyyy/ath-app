            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>GRE Issue Prompt</div>
            <div style={{ fontSize: 14, color: NAVY, lineHeight: 1.7, fontFamily: "Lora, Georgia, serif", marginBottom: 12 }}>{topic.s}</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.65, borderTop: `1px solid ${BORDER}`, paddingTop: 12 }}>{topic.t}</div>
            <button onClick={newTopic} style={{ marginTop: 12, fontSize: 11, padding: "4px 10px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 5, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New topic ↺</button>
          </div>

          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <div style={{ flex: 1, background: "#0f2a42", borderLeft: `3px solid ${CRIMSON}`, borderRadius: "0 8px 8px 0", padding: "12px 16px" }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#8aaabb", textTransform: "uppercase", marginBottom: 6 }}>Hook</div>
              <div style={{ fontSize: 12, color: "#d0dde8", fontFamily: "Lora, Georgia, serif", fontStyle: "italic", lineHeight: 1.6 }}>{currentHook}</div>
            </div>
            <div style={{ flex: 1, background: "#0f2a42", borderLeft: `3px solid ${CRIMSON}`, borderRadius: "0 8px 8px 0", padding: "12px 16px" }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#8aaabb", textTransform: "uppercase", marginBottom: 6 }}>Shift</div>
              <div style={{ fontSize: 12, color: "#d0dde8", fontFamily: "Lora, Georgia, serif", fontStyle: "italic", lineHeight: 1.6 }}>{currentShift}</div>
            </div>
          </div>

          {!submitted && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 4 }}>Thesis Statement</div>
              <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.6 }}>
                Write your thesis — the single most important sentence in your essay. It must take a clear position (not merely state that both sides have merit). Aim for a <strong>"mostly agree"</strong> or <strong>"mostly disagree"</strong> stance rather than a full agree/disagree — this leaves room for the concession paragraph and demonstrates nuance.
              </div>
            </div>
          )}

          {!submitted && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: NAVY, marginBottom: 8 }}>Position Spectrum — select where you stand</div>
              <div style={{ display: "flex", borderRadius: 6, overflow: "hidden" }}>
                {SPECTRUM.map((seg, i) => (
                  <div key={i} onClick={() => setSpecIdx(i)}
                    style={{ flex: 1, padding: "10px 6px", textAlign: "center", background: seg.color, color: seg.text, fontSize: 11, fontWeight: 700, cursor: "pointer", opacity: specIdx === -1 ? 1 : specIdx === i ? 1 : 0.5, transition: "opacity 0.15s" }}>
                    {seg.label}
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 6 }}>
                {specIdx === -1 ? <>Select your position — <strong>Mostly agree/disagree is recommended</strong> for GRE scoring.</> : SPECTRUM[specIdx].hint}
              </div>
            </div>
          )}

          {!submitted && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: timerColor, fontVariantNumeric: "tabular-nums", minWidth: 72 }}>{fmtTimerIntro(timeLeft)}</div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={startTimer} disabled={timerRunning} style={{ fontSize: 11, padding: "4px 10px", background: timerRunning ? "#f1f5f9" : NAVY, color: timerRunning ? "#94a3b8" : "#fff", border: "none", borderRadius: 5, cursor: timerRunning ? "default" : "pointer", fontFamily: "Inter, sans-serif" }}>Start</button>
                <button onClick={resetTimer} style={{ fontSize: 11, padding: "4px 10px", background: "#f1f5f9", border: `1px solid ${BORDER}`, borderRadius: 5, cursor: "pointer", color: "#64748b", fontFamily: "Inter, sans-serif" }}>Reset</button>
              </div>
              {role === "tutor" && (
                <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>
                  {["countdown", "countup", "benchmark"].map(m => (
                    <button key={m} onClick={() => switchTimerMode(m)} style={{ fontSize: 10, padding: "3px 8px", background: timerMode === m ? NAVY : "#fff", color: timerMode === m ? "#fff" : "#64748b", border: `1px solid ${BORDER}`, borderRadius: 4, cursor: "pointer", fontFamily: "Inter, sans-serif", textTransform: "capitalize" }}>{m}</button>
                  ))}
                </div>
              )}
              {timerExpired && <span style={{ fontSize: 11, color: CRIMSON, fontWeight: 600 }}>Time's up</span>}
            </div>
          )}

          {!submitted ? (
            <div>
              <textarea value={response} onChange={e => setResponse(e.target.value)}
                placeholder="Write your thesis statement here…"
                style={{ width: "100%", height: 90, padding: "14px 16px", borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 15, lineHeight: 1.75, resize: "vertical", boxSizing: "border-box", fontFamily: "Lora, Georgia, serif", color: "#1e293b", outline: "none" }}
                onFocus={e => { if (!timerRunning && !timerExpired) startTimer(); e.target.style.borderColor = NAVY; }}
                onBlur={e => e.target.style.borderColor = BORDER} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>{wordCount} words {specIdx < 0 && "· select a position above"}</div>
                <button onClick={handleSubmit} disabled={wordCount < 5 || specIdx < 0}
                  style={{ padding: "10px 28px", background: (wordCount >= 5 && specIdx >= 0) ? CRIMSON : "#e2e8f0", color: (wordCount >= 5 && specIdx >= 0) ? "#fff" : "#94a3b8", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: (wordCount >= 5 && specIdx >= 0) ? "pointer" : "default", fontFamily: "Inter, sans-serif" }}>
                  Score →
                </button>
              </div>
            </div>
          ) : scoring ? (
            <div style={{ padding: "32px 0", textAlign: "center", color: "#64748b", fontSize: 13 }}>
              <div style={{ fontSize: 24, marginBottom: 12 }}>⏳</div>
              Scoring your thesis…
            </div>
          ) : scoreData?.error ? (
            <div style={{ padding: 20, color: CRIMSON, fontSize: 13 }}>Scoring failed. <button onClick={tryAgain} style={{ color: NAVY, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Try again</button></div>
          ) : scoreData && (
            <div>
              <div style={{ background: "#f8fafc", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 6 }}>
                  Your thesis · Position detected: {scoreData.detectedPositionLabel}
                  {!scoreData.positionMatchesDeclared && <span style={{ marginLeft: 8, color: "#f59e0b" }}>(declared: {SPECTRUM[specIdx].label})</span>}
                </div>
                <div style={{ fontSize: 14, color: "#1e293b", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7 }}>{response}</div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, padding: "16px 20px", background: scoreData.pass ? "#f0fdf4" : "#fff7f7", borderRadius: 10, border: `1px solid ${scoreData.pass ? "#bbf7d0" : "#fecaca"}` }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 800, color: scoreData.pass ? "#16a34a" : CRIMSON, lineHeight: 1 }}>{scoreData.overall}</div>
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>/ 100</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: scoreData.pass ? "#15803d" : CRIMSON }}>{scoreData.pass ? "Pass ✓" : "Not yet — keep going"}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{scoreData.pass ? `Pass streak: ${consecutivePasses}/3` : "Need 80+ to pass · Streak resets"}</div>
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                {CRITERIA_THESIS.map(c => (
                  <div key={c.key} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: NAVY }}>{c.label} <span style={{ color: "#cbd5e1" }}>{c.weight}</span></span>
                      <span style={{ fontSize: 12, color: scoreData.criteria[c.key] >= 80 ? "#16a34a" : scoreData.criteria[c.key] >= 60 ? "#d97706" : CRIMSON, fontWeight: 700 }}>{scoreData.criteria[c.key]}%</span>
                    </div>
                    <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${scoreData.criteria[c.key]}%`, background: scoreData.criteria[c.key] >= 80 ? "#22c55e" : scoreData.criteria[c.key] >= 60 ? "#f59e0b" : CRIMSON, borderRadius: 3, transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{c.desc}</div>
                  </div>
                ))}
              </div>

              {[
                { label: "Detailed Feedback", text: scoreData.detailedFeedback, bg: "#eff6ff", border: "#bfdbfe", color: "#1d4ed8" },
                { label: "Spectrum Analysis", text: scoreData.spectrumAnalysis, bg: "#fffbeb", border: "#fde68a", color: "#b45309" },
                { label: "Flow Assessment", text: scoreData.flowAssessment, bg: "#f5f3ff", border: "#ddd6fe", color: "#6d28d9" },
              ].map((f, i) => (
                <div key={i} style={{ background: f.bg, border: `1px solid ${f.border}`, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: f.color, textTransform: "uppercase", marginBottom: 6 }}>{f.label}</div>
                  <div style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.7 }}>{f.text}</div>
                </div>
              ))}

              <div style={{ background: "#f0fdf4", border: `1px solid #bbf7d0`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#15803d", textTransform: "uppercase", marginBottom: 6 }}>Stronger Example</div>
                <div style={{ fontSize: 13, color: "#14532d", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7, marginBottom: 8 }}>{scoreData.strongerExample}</div>
                <div style={{ fontSize: 11, color: "#166534", borderTop: "1px solid #bbf7d0", paddingTop: 8 }}>{scoreData.strongerExampleExplain}</div>
              </div>

              {attempts.length > 1 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Attempt History</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {attempts.map((a, i) => (
                      <div key={i} style={{ padding: "4px 10px", borderRadius: 20, background: a.pass ? "#f0fdf4" : "#fff7f7", border: `1px solid ${a.pass ? "#bbf7d0" : "#fecaca"}`, fontSize: 12, fontWeight: 600, color: a.pass ? "#15803d" : CRIMSON }}>
                        #{i + 1} — {a.overall}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Try Again</button>
                <button onClick={newTopic} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New Topic</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


const BENCHMARK_TIME_OUTLINE = 30;
const MODULE_KEY_OUTLINE = "outline";

async function generateIntroContext(topicStatement) {
  try {
    return await window.ATHCore.scoreResponse(`For this GRE Issue Essay topic: "${topicStatement}" generate a complete strong introduction sequence. Return ONLY valid JSON: {"hook":"1-2 sentence generalisation hook","shift":"1 sentence bridging hook to topic","thesis":"1-2 sentence mostly-agree or mostly-disagree thesis with qualifying language"}`);
  } catch (e) {
    return {
      hook: "Throughout history, societies that reward cooperative structures have shown greater long-term resilience than those built purely on rivalry.",
      shift: "This tension between cooperative and competitive models is precisely what this issue asks us to weigh.",
      thesis: "While competition has real merits, a society is ultimately better served by instilling cooperation as its primary value, since institutions depend on coordinated trust more than individual rivalry."
    };
  }
}

function ATHOutline() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, useTopicRotation, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();

  const { topic, newTopic: rotateTopic } = useTopicRotation(OUTLINE_TOPICS);
  const [ctx, setCtx] = useState({ hook: "Loading…", shift: "Loading…", thesis: "Loading…" });
  const [paraCount, setParaCount] = useState(3);
  const [concessionType, setConcessionType] = useState("within");
  const [rows, setRows] = useState(Array(3).fill(""));
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY_OUTLINE, demoMode);

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_OUTLINE);

  function rowLabels() {
    const labels = [];
    for (let i = 0; i < paraCount; i++) labels.push(`Body ${i + 1}`);
    if (concessionType === "standalone") labels.push("Concession");
    return labels;
  }

  useEffect(() => {
    setRows(Array(rowLabels().length).fill(""));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [paraCount, concessionType]);

  useEffect(() => {
    generateIntroContext(topic.s).then(setCtx);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  function handleLogin(r) {
    login(r);
  }

  async function newTopic() {
    const newT = rotateTopic();
    setCtx({ hook: "Generating…", shift: "Generating…", thesis: "Generating…" });
    setRows(Array(rowLabels().length).fill(""));
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
    const newCtx = await generateIntroContext(newT.s);
    setCtx(newCtx);
  }

  function updateRow(i, val) {
    setRows(prev => { const next = [...prev]; next[i] = val; return next; });
  }

  const allFilled = rows.length > 0 && rows.every(r => r.trim().length > 5);

  async function handleSubmit() {
    if (!allFilled) return;
    setScoring(true);
    setSubmitted(true);

    const labels = rowLabels();
    const outlineTxt = labels.map((l, i) => `${l}: ${rows[i]}`).join("\n");

    try {
      const promptText = `You are a GRE Analytical Writing scorer. Score this essay outline.
TOPIC: "${topic.s}"
THESIS: "${ctx.thesis}"
CONCESSION TYPE: ${concessionType === "within" ? "Type 1 - within each body paragraph" : "Type 2 - standalone concession paragraph"}
OUTLINE:
${outlineTxt}

Score each 0-100:
1. THESIS ALIGNMENT (35%) - Do all paragraphs support the thesis? Penalise heavily if any paragraph contradicts it.
2. ARGUMENT QUALITY (25%) - Are arguments specific and distinct? Penalise vague "I will discuss" statements.
3. CONCESSION HANDLING (20%) - Is the concession appropriate for the chosen type? Penalise if absent.
4. STRUCTURAL COHERENCE (20%) - Does the ordering make logical sense?

Weighted overall=(ta*0.35)+(aq*0.25)+(ch*0.20)+(sc*0.20) rounded.

Return ONLY valid JSON no markdown:
{"overall":<int>,"pass":<bool>,"criteria":{"thesisAlignment":<int>,"argumentQuality":<int>,"concessionHandling":<int>,"structuralCoherence":<int>},"detailedFeedback":"<2-3 sentences>","paragraphFeedback":[<one string per row in order>],"thesisAlignmentNote":"<1-2 sentences>","strongerExample":"<strong 3-body outline for this topic, format: Body 1: ... | Body 2: ... | Concession: ... >","strongerExampleExplain":"<1 sentence>"}`;

      const parsed = await scoreResponse(promptText);
      setScoreData(parsed);
      recordAttempt({ ...parsed, rows: [...rows], labels, paraCount, concessionType }, null);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setSubmitted(false);
    setScoreData(null);
    newTopic();
  }

  const timerColor = timeLeft <= 10 && timerMode !== "countup" ? CRIMSON : NAVY;
  const labels = rowLabels();

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Introduction</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Outline</div>
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <button onClick={() => setRole("student")} style={{ flex: 1, padding: "12px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Student</button>
            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
          </div>
          {role === "__tutor_pin" && (
            <div>
              <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
                style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif" }}
                onKeyDown={e => e.key === "Enter" && handleLogin("tutor")} />
              {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6 }}>{pinError}</div>}
              <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter as Tutor</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (role && !studentId && !demoMode) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "40px 36px", width: 400, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>Analytical Training Hub</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", textAlign: "center", marginBottom: 20 }}>Who's training?</div>
          {roster.length === 0 ? (
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", lineHeight: 1.6, marginBottom: 16 }}>
              No students on the roster yet. Ask your tutor to add students in the Tutor Dashboard.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16, maxHeight: 280, overflowY: "auto" }}>
              {roster.map(s => (
                <button key={s.id} onClick={() => setStudentId(s.id)} style={{ padding: "10px 14px", background: "#fff", border: `1.5px solid ${BORDER}`, borderRadius: 8, textAlign: "left", fontWeight: 600, fontSize: 13.5, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  {s.name}
                </button>
              ))}
            </div>
          )}
          <button onClick={() => setDemoMode(true)} style={{ width: "100%", padding: "8px 0", background: "none", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Inter, sans-serif", textDecoration: "underline" }}>
            Continue without saving (demo)
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", display: "flex" }}>
      <div style={{ width: sidebarOpen ? 240 : 0, minWidth: sidebarOpen ? 240 : 0, background: NAVY, color: "#fff", transition: "width 0.25s, min-width 0.25s", overflow: "hidden", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "28px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.10)" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 4 }}>ATH</div>
          <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "Lora, Georgia, serif" }}>Analytical Training Hub</div>
        </div>
        <div style={{ padding: "16px 0", flex: 1 }}>
          <div style={{ padding: "8px 20px", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "rgba(255,255,255,0.9)" }}>Introduction</div>
          {["Hook ✓", "Shift to Prompt ✓", "Thesis ✓", "Outline ←"].map((s, j) => (
            <div key={j} style={{ padding: "5px 20px 5px 32px", fontSize: 12, color: s.includes("←") ? "#fbbf24" : s.includes("✓") ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.35)" }}>
              {s.replace(" ←", "")}{s.includes("←") && <span style={{ color: "#fbbf24", marginLeft: 4 }}>◀</span>}
            </div>
          ))}
        </div>
        <div style={{ padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.10)", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>
          {role === "tutor" ? "👤 Tutor" : "👤 Student"}{studentId && !demoMode ? ` — ${(roster.find(s => s.id === studentId) || {}).name || ""}` : demoMode ? " — Demo" : ""}
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <div style={{ background: "#fff", borderBottom: `1px solid ${BORDER}`, padding: "0 24px", height: 52, display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
          <button onClick={() => setSidebarOpen(o => !o)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: NAVY, padding: 4 }}>☰</button>
          <div style={{ fontSize: 12, color: "#64748b" }}>
            <span style={{ color: NAVY, fontWeight: 600 }}>Introduction</span>
            <span style={{ margin: "0 6px" }}>›</span>
            <span style={{ color: CRIMSON, fontWeight: 600 }}>Outline</span>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 5 }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < consecutivePasses ? "#22c55e" : BORDER, border: `1px solid ${i < consecutivePasses ? "#16a34a" : BORDER}` }} />
            ))}
            <span style={{ fontSize: 11, color: "#64748b", marginLeft: 4 }}>Pass streak</span>
            {role === "tutor" && !passed && (
              <button onClick={() => setOverrideMode(true)} style={{ fontSize: 11, padding: "4px 10px", background: "#fff7ed", border: "1px solid #f59e0b", borderRadius: 5, color: "#b45309", fontWeight: 600, cursor: "pointer", marginLeft: 10, fontFamily: "Inter, sans-serif" }}>Override</button>
            )}
          </div>
        </div>

        {overrideMode && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380, boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: NAVY, marginBottom: 12 }}>Tutor Override</div>
              <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Mark this student as having passed this gate.</div>
              <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Override note (optional)…" style={{ width: "100%", height: 80, padding: 10, borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 13, resize: "none", boxSizing: "border-box", fontFamily: "Inter, sans-serif" }} />
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button onClick={() => setOverrideMode(false)} style={{ flex: 1, padding: "10px 0", background: "#f1f5f9", border: "none", borderRadius: 7, fontWeight: 600, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Cancel</button>
                <button onClick={tutorOverride} style={{ flex: 1, padding: "10px 0", background: CRIMSON, border: "none", borderRadius: 7, fontWeight: 600, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Confirm Override</button>
              </div>
            </div>
          </div>
        )}

        {passed && (
          <div style={{ background: "#f0fdf4", borderBottom: "2px solid #22c55e", padding: "14px 28px", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 20 }}>🎉</span>
            <div>
              <div style={{ fontWeight: 700, color: "#15803d", fontSize: 14 }}>Introduction Module Complete!</div>
              <div style={{ fontSize: 12, color: "#166534" }}>All four sub-sections mastered. You're ready for Body Paragraph training.</div>
            </div>
            <button onClick={newTopic} style={{ marginLeft: "auto", padding: "8px 18px", background: NAVY, color: "#fff", border: "none", borderRadius: 7, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Begin Body Paragraphs →</button>
          </div>
        )}

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px", maxWidth: 820, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>

          <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "20px 24px", marginBottom: 12 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>GRE Issue Prompt</div>
            <div style={{ fontSize: 14, color: NAVY, lineHeight: 1.7, fontFamily: "Lora, Georgia, serif", marginBottom: 12 }}>{topic.s}</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.65, borderTop: `1px solid ${BORDER}`, paddingTop: 12 }}>{topic.t}</div>
            <button onClick={newTopic} style={{ marginTop: 12, fontSize: 11, padding: "4px 10px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 5, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New topic ↺</button>
          </div>

          <div style={{ background: "#fffbeb", border: `1px solid #fde68a`, borderRadius: 10, padding: "14px 20px", marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#92400e", textTransform: "uppercase", marginBottom: 6 }}>Your generated introduction for this topic <span style={{ background: "#fde68a", padding: "2px 8px", borderRadius: 20, fontSize: 10 }}>AI-generated sample</span></div>
            <div style={{ fontSize: 12, color: "#78350f", fontFamily: "Lora, Georgia, serif", lineHeight: 1.6, marginBottom: 6 }}><strong>Hook:</strong> {ctx.hook}</div>
            <div style={{ fontSize: 12, color: "#78350f", fontFamily: "Lora, Georgia, serif", lineHeight: 1.6, marginBottom: 6 }}><strong>Shift:</strong> {ctx.shift}</div>
            <div style={{ fontSize: 12, color: "#78350f", fontFamily: "Lora, Georgia, serif", lineHeight: 1.6 }}><strong>Thesis:</strong> {ctx.thesis}</div>
          </div>

          {!submitted && (
            <>
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 4 }}>Outline</div>
                <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.6 }}>
                  Write one sentence per planned body paragraph summarising your argument. Include your concession. More paragraphs means more words, which signals depth to the e-rater.
                </div>
              </div>

              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: NAVY, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Body paragraphs</div>
                <div style={{ display: "flex", gap: 6 }}>
                  {[2, 3, 4, 5].map(n => (
                    <button key={n} onClick={() => setParaCount(n)} style={{ width: 40, height: 40, borderRadius: 8, border: `1.5px solid ${paraCount === n ? NAVY : BORDER}`, background: paraCount === n ? NAVY : "#fff", color: paraCount === n ? "#fff" : NAVY, fontWeight: 700, fontSize: 15, cursor: "pointer" }}>{n}</button>
                  ))}
                  <span style={{ fontSize: 11, color: "#94a3b8", alignSelf: "center", marginLeft: 8 }}>More = more words = higher e-rater score</span>
                </div>
              </div>

              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: NAVY, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Concession type</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                  <button onClick={() => setConcessionType("within")} style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: `1.5px solid ${concessionType === "within" ? NAVY : BORDER}`, background: concessionType === "within" ? NAVY : "#fff", color: concessionType === "within" ? "#fff" : "#475569", fontWeight: 600, fontSize: 12, cursor: "pointer", textAlign: "left" }}>Type 1 — Within each body paragraph</button>
                  <button onClick={() => setConcessionType("standalone")} style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: `1.5px solid ${concessionType === "standalone" ? NAVY : BORDER}`, background: concessionType === "standalone" ? NAVY : "#fff", color: concessionType === "standalone" ? "#fff" : "#475569", fontWeight: 600, fontSize: 12, cursor: "pointer", textAlign: "left" }}>Type 2 — Standalone concession paragraph</button>
                </div>
                <div style={{ fontSize: 11, color: "#64748b" }}>
                  {concessionType === "within" ? "Type 1: Each body paragraph briefly acknowledges the opposing view before reinforcing your argument." : "Type 2: One full standalone paragraph dedicated to the counterargument and your rebuttal."}
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
                {labels.map((label, i) => (
                  <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <span style={{ padding: "6px 12px", borderRadius: 6, background: label === "Concession" ? "#8a5a1a" : NAVY, color: "#fff", fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", marginTop: 2 }}>{label}</span>
                    <textarea value={rows[i] || ""} onChange={e => updateRow(i, e.target.value)}
                      placeholder={label === "Concession" ? "Counterargument you will acknowledge and rebut…" : concessionType === "within" ? `${label} argument (note the concession you'll include within)…` : `${label} main argument…`}
                      rows={2}
                      style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 13, lineHeight: 1.6, resize: "vertical", boxSizing: "border-box", fontFamily: "Inter, sans-serif", outline: "none" }}
                      onFocus={e => { if (!timerRunning && !timerExpired) startTimer(); e.target.style.borderColor = NAVY; }}
                      onBlur={e => e.target.style.borderColor = BORDER} />
                  </div>
                ))}
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: timerColor, fontVariantNumeric: "tabular-nums" }}>{fmtTimerIntro(timeLeft)}</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={startTimer} disabled={timerRunning} style={{ fontSize: 11, padding: "4px 10px", background: timerRunning ? "#f1f5f9" : NAVY, color: timerRunning ? "#94a3b8" : "#fff", border: "none", borderRadius: 5, cursor: timerRunning ? "default" : "pointer", fontFamily: "Inter, sans-serif" }}>Start</button>
                  <button onClick={resetTimer} style={{ fontSize: 11, padding: "4px 10px", background: "#f1f5f9", border: `1px solid ${BORDER}`, borderRadius: 5, cursor: "pointer", color: "#64748b", fontFamily: "Inter, sans-serif" }}>Reset</button>
                </div>
                {role === "tutor" && (
                  <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>
                    {["countdown", "countup", "benchmark"].map(m => (
                      <button key={m} onClick={() => switchTimerMode(m)} style={{ fontSize: 10, padding: "3px 8px", background: timerMode === m ? NAVY : "#fff", color: timerMode === m ? "#fff" : "#64748b", border: `1px solid ${BORDER}`, borderRadius: 4, cursor: "pointer", fontFamily: "Inter, sans-serif", textTransform: "capitalize" }}>{m}</button>
                    ))}
                  </div>
                )}
              </div>

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 11, color: "#94a3b8" }}>{allFilled ? "Ready to submit" : "Fill all fields to submit"}</span>
                <button onClick={handleSubmit} disabled={!allFilled}
                  style={{ padding: "10px 28px", background: allFilled ? CRIMSON : "#e2e8f0", color: allFilled ? "#fff" : "#94a3b8", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: allFilled ? "pointer" : "default", fontFamily: "Inter, sans-serif" }}>
                  Score →
                </button>
              </div>
            </>
          )}

          {submitted && scoring && (
            <div style={{ padding: "32px 0", textAlign: "center", color: "#64748b", fontSize: 13 }}>
              <div style={{ fontSize: 24, marginBottom: 12 }}>⏳</div>
              Scoring your outline…
            </div>
          )}

          {submitted && !scoring && scoreData?.error && (
            <div style={{ padding: 20, color: CRIMSON, fontSize: 13 }}>Scoring failed. <button onClick={tryAgain} style={{ color: NAVY, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Try again</button></div>
          )}

          {submitted && !scoring && scoreData && !scoreData.error && (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, padding: "16px 20px", background: scoreData.pass ? "#f0fdf4" : "#fff7f7", borderRadius: 10, border: `1px solid ${scoreData.pass ? "#bbf7d0" : "#fecaca"}` }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 800, color: scoreData.pass ? "#16a34a" : CRIMSON, lineHeight: 1 }}>{scoreData.overall}</div>
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>/ 100</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: scoreData.pass ? "#15803d" : CRIMSON }}>{scoreData.pass ? "Pass ✓" : "Not yet — keep going"}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>
                    {scoreData.pass ? `Pass streak: ${consecutivePasses}/3` : "Need 80+ to pass · Streak resets"} · {paraCount} body para{paraCount > 1 ? "s" : ""}{concessionType === "standalone" ? " + standalone concession" : " with inline concessions"}
                  </div>
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                {CRITERIA_OUTLINE.map(c => (
                  <div key={c.key} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: NAVY }}>{c.label} <span style={{ color: "#cbd5e1" }}>{c.weight}</span></span>
                      <span style={{ fontSize: 12, color: scoreData.criteria[c.key] >= 80 ? "#16a34a" : scoreData.criteria[c.key] >= 60 ? "#d97706" : CRIMSON, fontWeight: 700 }}>{scoreData.criteria[c.key]}%</span>
                    </div>
                    <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${scoreData.criteria[c.key]}%`, background: scoreData.criteria[c.key] >= 80 ? "#22c55e" : scoreData.criteria[c.key] >= 60 ? "#f59e0b" : CRIMSON, borderRadius: 3, transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{c.desc}</div>
                  </div>
                ))}
              </div>

              <div style={{ background: "#eff6ff", border: `1px solid #bfdbfe`, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#1d4ed8", textTransform: "uppercase", marginBottom: 6 }}>Detailed Feedback</div>
                <div style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.7 }}>{scoreData.detailedFeedback}</div>
              </div>

              <div style={{ background: "#f8fafc", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 10 }}>Paragraph-by-Paragraph Breakdown</div>
                {labels.map((label, i) => (
                  <div key={i} style={{ marginBottom: 10, paddingBottom: 10, borderBottom: i < labels.length - 1 ? `1px solid ${BORDER}` : "none" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: NAVY, marginBottom: 2 }}>{label}</div>
                    <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic", marginBottom: 3 }}>"{rows[i]}"</div>
                    <div style={{ fontSize: 12, color: "#475569" }}>{(scoreData.paragraphFeedback && scoreData.paragraphFeedback[i]) || "—"}</div>
                  </div>
                ))}
              </div>

              <div style={{ background: "#fffbeb", border: `1px solid #fde68a`, borderRadius: 8, padding: "14px 18px", marginBottom: 12 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#b45309", textTransform: "uppercase", marginBottom: 6 }}>Thesis Alignment</div>
                <div style={{ fontSize: 13, color: "#1e293b", lineHeight: 1.7 }}>{scoreData.thesisAlignmentNote}</div>
              </div>

              <div style={{ background: "#f0fdf4", border: `1px solid #bbf7d0`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#15803d", textTransform: "uppercase", marginBottom: 6 }}>Stronger Example Outline</div>
                <div style={{ fontSize: 13, color: "#14532d", lineHeight: 1.8, marginBottom: 8 }}>
                  {(scoreData.strongerExample || "").split("|").map((part, i) => <div key={i}>{part.trim()}</div>)}
                </div>
                <div style={{ fontSize: 11, color: "#166534", borderTop: "1px solid #bbf7d0", paddingTop: 8 }}>{scoreData.strongerExampleExplain}</div>
              </div>

              {attempts.length > 1 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Attempt History</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {attempts.map((a, i) => (
                      <div key={i} style={{ padding: "4px 10px", borderRadius: 20, background: a.pass ? "#f0fdf4" : "#fff7f7", border: `1px solid ${a.pass ? "#bbf7d0" : "#fecaca"}`, fontSize: 12, fontWeight: 600, color: a.pass ? "#15803d" : CRIMSON }}>
                        #{i + 1} — {a.overall}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Try Again</button>
                <button onClick={newTopic} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New Topic</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


const MODULE_LIST = [
  { key: "bp1_ts", group: "Body Paragraph I", label: "Topic Sentence" },
  { key: "bp1_ex", group: "Body Paragraph I", label: "Example" },
  { key: "bp1_dev", group: "Body Paragraph I", label: "Development" },
  { key: "bp1_conc", group: "Body Paragraph I", label: "Concession" },
  { key: "bp2_ts", group: "Body Paragraph II", label: "Topic Sentence" },
  { key: "bp2_ex", group: "Body Paragraph II", label: "Example" },
  { key: "bp2_dev", group: "Body Paragraph II", label: "Development" },
  { key: "bp2_conc", group: "Body Paragraph II", label: "Concession" },
  { key: "conc_reaff", group: "Conclusion", label: "Thesis Reaffirmation" },
  { key: "conc_syn", group: "Conclusion", label: "Synthesis" },
  { key: "conc_final", group: "Conclusion", label: "Final Thought" },
  { key: "full_essay", group: "Full Essay", label: "Full Essay Mode" },
];
const MODULE_GROUPS_ORDER = ["Body Paragraph I", "Body Paragraph II", "Conclusion", "Full Essay"];

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) +
    " " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}

function statusOf(progress) {
  if (!progress) return "not_started";
  if (progress.passed) return "passed";
  if ((progress.attempts || []).length > 0) return "in_progress";
  return "not_started";
}

function ATHTutorDashboard() {
  const { getRoster, addRosterStudent, removeRosterStudent, getAllProgress, getNotes, setNotes, setProgress } = window.ATHCore;

  const [authed, setAuthed] = useState(false);
  const [pin, setPin] = useState("");
  const [pinError, setPinError] = useState("");

  const [roster, setRoster] = useState([]);
  const [newStudentName, setNewStudentName] = useState("");
  const [selectedStudentId, setSelectedStudentId] = useState(null);

  const [progressMap, setProgressMap] = useState({});
  const [noteDraft, setNoteDraft] = useState("");
  const [loading, setLoading] = useState(false);
  const [expandedModule, setExpandedModule] = useState(null);
  const [lastRefreshed, setLastRefreshed] = useState(null);

  useEffect(() => {
    if (authed) loadAll();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [authed]);

  useEffect(() => {
    if (!selectedStudentId) return;
    (async () => {
      const text = await getNotes(selectedStudentId);
      setNoteDraft(text || "");
    })();
  }, [selectedStudentId]);

  async function loadAll() {
    setLoading(true);
    const rosterList = await getRoster();
    setRoster(rosterList);
    const map = await getAllProgress();
    setProgressMap(map);
    setLastRefreshed(new Date().toISOString());
    setLoading(false);
  }

  function handleLogin() {
    if (pin !== "1234") { setPinError("Incorrect PIN."); return; }
    setAuthed(true);
  }

  async function addStudent() {
    const name = newStudentName.trim();
    if (!name) return;
    const created = await addRosterStudent(name);
    if (created) setRoster(prev => [...prev, created]);
    setNewStudentName("");
  }

  async function removeStudent(id) {
    await removeRosterStudent(id);
    setRoster(prev => prev.filter(s => s.id !== id));
    if (selectedStudentId === id) setSelectedStudentId(null);
  }

  async function saveNote() {
    if (!selectedStudentId) return;
    await setNotes(selectedStudentId, noteDraft);
  }

  async function overridePass(studentId, moduleKey) {
    const existing = (progressMap[studentId] && progressMap[studentId][moduleKey]) || { attempts: [] };
    const updated = { ...existing, consecutivePasses: 3, passed: true, lastUpdated: new Date().toISOString() };
    await setProgress(studentId, moduleKey, { consecutivePasses: 3, passed: true, attempts: existing.attempts || [], best: existing.best || 0 });
    setProgressMap(prev => ({ ...prev, [studentId]: { ...(prev[studentId] || {}), [moduleKey]: updated } }));
  }

  const selectedStudent = roster.find(s => s.id === selectedStudentId) || null;

  if (!authed) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Tutor Dashboard</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Roster, progress, notes, and overrides</div>
          </div>
          <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
            style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif" }}
            onKeyDown={e => e.key === "Enter" && handleLogin()} />
          {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6 }}>{pinError}</div>}
          <button onClick={handleLogin} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter Dashboard</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", display: "flex" }}>
      <div style={{ width: 260, minWidth: 260, background: NAVY, color: "#fff", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "24px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.10)" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 4 }}>ATH</div>
          <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "Lora, Georgia, serif" }}>Tutor Dashboard</div>
        </div>

        <div style={{ padding: "16px 20px", borderBottom: "1px solid rgba(255,255,255,0.10)" }}>
          <div style={{ display: "flex", gap: 6 }}>
            <input value={newStudentName} onChange={e => setNewStudentName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addStudent()}
              placeholder="Add student name…"
              style={{ flex: 1, padding: "7px 10px", borderRadius: 6, border: "none", fontSize: 12, fontFamily: "Inter, sans-serif" }} />
            <button onClick={addStudent} style={{ padding: "7px 10px", background: CRIMSON, color: "#fff", border: "none", borderRadius: 6, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>+</button>
          </div>
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "8px 0" }}>
          <div
            onClick={() => setSelectedStudentId(null)}
            style={{ padding: "10px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", background: selectedStudentId === null ? "rgba(255,255,255,0.10)" : "transparent", color: selectedStudentId === null ? "#fff" : "rgba(255,255,255,0.65)" }}
          >
            ▦ All Students (Overview)
          </div>
          {roster.map(s => (
            <div key={s.id}
              style={{ display: "flex", alignItems: "center", padding: "10px 20px", background: selectedStudentId === s.id ? "rgba(255,255,255,0.10)" : "transparent", cursor: "pointer" }}
            >
              <div onClick={() => setSelectedStudentId(s.id)} style={{ flex: 1, fontSize: 13, fontWeight: 600, color: selectedStudentId === s.id ? "#fff" : "rgba(255,255,255,0.75)" }}>
                {s.name}
              </div>
              <button onClick={() => removeStudent(s.id)} title="Remove student" style={{ background: "none", border: "none", color: "rgba(255,255,255,0.35)", cursor: "pointer", fontSize: 13 }}>✕</button>
            </div>
          ))}
          {roster.length === 0 && (
            <div style={{ padding: "10px 20px", fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.6 }}>
              No students yet. Add one above — students will then see their name in the "Who's training?" screen of every module.
            </div>
          )}
        </div>

        <div style={{ padding: "14px 20px", borderTop: "1px solid rgba(255,255,255,0.10)" }}>
          <button onClick={loadAll} disabled={loading} style={{ width: "100%", padding: "8px 0", background: "rgba(255,255,255,0.10)", color: "#fff", border: "none", borderRadius: 6, fontWeight: 600, fontSize: 12, cursor: loading ? "default" : "pointer" }}>
            {loading ? "Refreshing…" : "↻ Refresh Data"}
          </button>
          {lastRefreshed && <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginTop: 6, textAlign: "center" }}>Updated {formatDate(lastRefreshed)}</div>}
        </div>
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>
        {!selectedStudent ? (
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", marginBottom: 4 }}>Roster Overview</div>
            <div style={{ fontSize: 13, color: "#64748b", marginBottom: 20 }}>Click a student's name (left) for their full detail view, notes, and overrides.</div>

            {roster.length === 0 ? (
              <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: 32, textAlign: "center", color: "#64748b", fontSize: 13 }}>
                Add students on the left to start tracking progress.
              </div>
            ) : (
              <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, overflow: "hidden" }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ borderCollapse: "collapse", width: "100%", fontSize: 12 }}>
                    <thead>
                      <tr>
                        <th style={{ textAlign: "left", padding: "10px 14px", borderBottom: `1px solid ${BORDER}`, color: "#64748b", fontWeight: 700, position: "sticky", left: 0, background: "#fff" }}>Student</th>
                        {MODULE_LIST.map(m => (
                          <th key={m.key} title={`${m.group} — ${m.label}`} style={{ padding: "10px 8px", borderBottom: `1px solid ${BORDER}`, color: "#94a3b8", fontWeight: 600, fontSize: 10, whiteSpace: "nowrap" }}>
                            {m.label.split(" ").map(w => w[0]).join("")}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {roster.map(s => (
                        <tr key={s.id} onClick={() => setSelectedStudentId(s.id)} style={{ cursor: "pointer" }}
                          onMouseEnter={e => e.currentTarget.style.background = LIGHT_BG} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                          <td style={{ padding: "10px 14px", borderBottom: `1px solid ${BORDER}`, fontWeight: 600, color: NAVY, position: "sticky", left: 0, background: "#fff" }}>{s.name}</td>
                          {MODULE_LIST.map(m => {
                            const progress = progressMap[s.id] && progressMap[s.id][m.key];
                            const status = statusOf(progress);
                            const dot = status === "passed" ? "✓" : status === "in_progress" ? (progress.consecutivePasses || 0) : "–";
                            const color = status === "passed" ? "#16a34a" : status === "in_progress" ? "#d97706" : "#cbd5e1";
                            return (
                              <td key={m.key} style={{ padding: "10px 8px", borderBottom: `1px solid ${BORDER}`, textAlign: "center", color, fontWeight: 700 }}>
                                {dot}
                              </td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{ padding: "10px 14px", fontSize: 11, color: "#94a3b8", borderTop: `1px solid ${BORDER}` }}>
                  ✓ = gate cleared · number = consecutive passes so far (streak toward 3) · – = not started yet
                </div>
              </div>
            )}
          </div>
        ) : (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>{selectedStudent.name}</div>
                <div style={{ fontSize: 12, color: "#94a3b8" }}>Student ID: {selectedStudent.id}</div>
              </div>
              <button onClick={() => setSelectedStudentId(null)} style={{ padding: "8px 16px", background: "#fff", border: `1.5px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 12, color: "#64748b", cursor: "pointer" }}>← All Students</button>
            </div>

            <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "16px 18px", marginBottom: 24 }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 8 }}>Tutor Notes</div>
              <textarea value={noteDraft} onChange={e => setNoteDraft(e.target.value)} placeholder="Private notes about this student's progress, patterns, or things to revisit…"
                style={{ width: "100%", height: 80, padding: 10, borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 13, resize: "vertical", boxSizing: "border-box", fontFamily: "Inter, sans-serif" }} />
              <button onClick={saveNote} style={{ marginTop: 8, padding: "7px 16px", background: NAVY, color: "#fff", border: "none", borderRadius: 6, fontWeight: 600, fontSize: 12, cursor: "pointer" }}>Save Note</button>
            </div>

            {MODULE_GROUPS_ORDER.map(group => (
              <div key={group} style={{ marginBottom: 22 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 10 }}>{group}</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: 10 }}>
                  {MODULE_LIST.filter(m => m.group === group).map(m => {
                    const progress = (progressMap[selectedStudent.id] && progressMap[selectedStudent.id][m.key]) || null;
                    const status = statusOf(progress);
                    const attempts = (progress && progress.attempts) || [];
                    const lastAttempt = attempts[attempts.length - 1];
                    const isExpanded = expandedModule === `${selectedStudent.id}:${m.key}`;
                    return (
                      <div key={m.key} style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "14px 16px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                          <div style={{ fontSize: 13, fontWeight: 700, color: NAVY }}>{m.label}</div>
                          <span style={{
                            fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 20,
                            background: status === "passed" ? "#f0fdf4" : status === "in_progress" ? "#fffbeb" : "#f1f5f9",
                            color: status === "passed" ? "#15803d" : status === "in_progress" ? "#b45309" : "#94a3b8",
                          }}>
                            {status === "passed" ? "Passed" : status === "in_progress" ? "In Progress" : "Not Started"}
                          </span>
                        </div>
                        <div style={{ fontSize: 11, color: "#64748b", marginBottom: 4 }}>
                          {attempts.length} attempt{attempts.length !== 1 ? "s" : ""}
                          {lastAttempt ? ` · last score ${lastAttempt.overall_score ?? lastAttempt.gre_scaled_score ?? "—"}` : ""}
                        </div>
                        <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 10 }}>
                          {lastAttempt ? `Last activity: ${formatDate(lastAttempt.timestamp)}` : "No activity yet"}
                        </div>
                        <div style={{ display: "flex", gap: 6 }}>
                          {status !== "passed" && (
                            <button onClick={() => overridePass(selectedStudent.id, m.key)} style={{ fontSize: 11, padding: "5px 10px", background: "#fff7ed", border: "1px solid #f59e0b", borderRadius: 5, color: "#b45309", fontWeight: 600, cursor: "pointer" }}>
                              Mark Passed
                            </button>
                          )}
                          {attempts.length > 0 && (
                            <button onClick={() => setExpandedModule(isExpanded ? null : `${selectedStudent.id}:${m.key}`)} style={{ fontSize: 11, padding: "5px 10px", background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 5, color: "#64748b", fontWeight: 600, cursor: "pointer" }}>
                              {isExpanded ? "Hide History" : "View History"}
                            </button>
                          )}
                        </div>
                        {isExpanded && (
                          <div style={{ marginTop: 10, borderTop: `1px solid ${BORDER}`, paddingTop: 10, maxHeight: 220, overflowY: "auto" }}>
                            {attempts.slice().reverse().map((a, i) => (
                              <div key={i} style={{ marginBottom: 8, paddingBottom: 8, borderBottom: i < attempts.length - 1 ? `1px solid ${LIGHT_BG}` : "none" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                                  <span style={{ fontWeight: 700, color: (a.passed || (a.overall_score ?? 0) >= 80) ? "#16a34a" : CRIMSON }}>
                                    {a.overall_score ?? a.gre_scaled_score ?? "—"}{a.gre_scaled_score !== undefined ? "/6" : "/100"}
                                  </span>
                                  <span style={{ color: "#94a3b8" }}>{formatDate(a.timestamp)}</span>
                                </div>
                                {a.response && (
                                  <div style={{ fontSize: 11, color: "#64748b", marginTop: 3, fontFamily: "Lora, Georgia, serif", lineHeight: 1.5 }}>
                                    {a.response.slice(0, 160)}{a.response.length > 160 ? "…" : ""}
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

const MODULE_GROUPS = [
  {
    label: "Introduction",
    modules: [
      { key: "hook", label: "Hook", Component: ATHHook },
      { key: "shift", label: "Shift to Prompt", Component: ATHShiftToPrompt },
      { key: "thesis", label: "Thesis", Component: ATHThesis },
      { key: "outline", label: "Outline", Component: ATHOutline },
    ],
  },
  {
    label: "Body Paragraph I",
    modules: [
      { key: "bp1_ts", label: "Topic Sentence", Component: ATHTopicSentence },
      { key: "bp1_ex", label: "Example", Component: ATHBp1Example },
      { key: "bp1_dev", label: "Development", Component: ATHBp1Development },
      { key: "bp1_conc", label: "Concession", Component: ATHBp1Concession },
    ],
  },
  {
    label: "Body Paragraph II",
    modules: [
      { key: "bp2_ts", label: "Topic Sentence", Component: ATHBp2TopicSentence },
      { key: "bp2_ex", label: "Example", Component: ATHBp2Example },
      { key: "bp2_dev", label: "Development", Component: ATHBp2Development },
      { key: "bp2_conc", label: "Concession", Component: ATHBp2Concession },
    ],
  },
  {
    label: "Conclusion",
    modules: [
      { key: "conc_reaff", label: "Thesis Reaffirmation", Component: ATHConclusionThesisReaffirmation },
      { key: "conc_syn", label: "Synthesis", Component: ATHConclusionSynthesis },
      { key: "conc_final", label: "Final Thought", Component: ATHConclusionFinalThought },
    ],
  },
  {
    label: "Full Essay",
    modules: [
      { key: "full_essay", label: "Full Essay Mode (30-60 min)", Component: ATHFullEssayMode },
    ],
  },
  {
    label: "Tutor Tools",
    modules: [
      { key: "tutor_dashboard", label: "Tutor Dashboard", Component: ATHTutorDashboard },
    ],
  },
];

function ATHDashboard() {
  const { useAuth, useRoster, getAllProgress, resetSession } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();

  const [activeKey, setActiveKey] = useState(null);
  const [viewingStudentId, setViewingStudentId] = useState(null); // tutor: which student's map they're previewing
  const [progressMap, setProgressMap] = useState({});
  const [loadingProgress, setLoadingProgress] = useState(false);
  const [nameQuery, setNameQuery] = useState(""); // student picker: type-your-own-name, doesn't expose the full roster

  const effectiveStudentId = role === "tutor" ? viewingStudentId : studentId;

  async function loadProgress() {
    if (!effectiveStudentId) { setProgressMap({}); return; }
    setLoadingProgress(true);
    const all = await getAllProgress();
    setProgressMap(all[effectiveStudentId] || {});
    setLoadingProgress(false);
  }

  useEffect(() => {
    let cancelled = false;
    (async () => {
      if (!effectiveStudentId) { setProgressMap({}); return; }
      setLoadingProgress(true);
      const all = await getAllProgress();
      if (!cancelled) {
        setProgressMap(all[effectiveStudentId] || {});
        setLoadingProgress(false);
      }
    })();
    return () => { cancelled = true; };
  }, [effectiveStudentId]);

  function handleLogin(r) {
    login(r);
  }

  function logOut() {
    resetSession();
    setRole(null);
    setStudentId(null);
    setDemoMode(false);
    setViewingStudentId(null);
    setActiveKey(null);
    setProgressMap({});
  }

  const allGroups = MODULE_GROUPS.filter(g => g.label !== "Tutor Tools");
  const flatModules = allGroups.flatMap(g => g.modules);
  const tutorDashboardEntry = MODULE_GROUPS.find(g => g.label === "Tutor Tools").modules[0];

  function statusFor(key) {
    const p = progressMap[key];
    if (!p) return "not_started";
    if (p.passed) return "passed";
    if ((p.attempts || []).length > 0) return "in_progress";
    return "not_started";
  }

  function findContinueModule() {
    for (const m of flatModules) {
      if (statusFor(m.key) !== "passed") return m;
    }
    return null;
  }

  // --- Currently inside a module or the Tutor Dashboard ---
  if (activeKey) {
    const found = flatModules.concat([tutorDashboardEntry]).find(m => m.key === activeKey);
    const ActiveComponent = found.Component;
    return (
      <div style={{ position: "relative", minHeight: "100vh" }}>
        <button
          onClick={() => { setActiveKey(null); loadProgress(); }}
          style={{
            position: "fixed", top: 10, right: 10, zIndex: 1000,
            padding: "8px 16px", background: NAVY, color: "#fff", border: "none",
            borderRadius: 8, fontWeight: 700, fontSize: 12, cursor: "pointer",
            fontFamily: "Inter, sans-serif", boxShadow: "0 2px 10px rgba(0,0,0,0.25)"
          }}
        >
          ← Back to Dashboard
        </button>
        <ActiveComponent key={activeKey} />
      </div>
    );
  }

  // --- Login screen ---
  if (!role || role === "__tutor_pin") {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ width: 420, borderRadius: 14, overflow: "hidden", boxShadow: "0 8px 40px rgba(26,58,92,0.18)" }}>
          <div style={{ background: NAVY, padding: "40px 40px 32px", textAlign: "center", borderBottom: `4px solid ${CRIMSON}` }}>
            <div style={{ fontSize: 12, fontWeight: 900, letterSpacing: 4, color: CRIMSON, textTransform: "uppercase", marginBottom: 10 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 30, fontWeight: 900, color: "#fff", fontFamily: "Lora, Georgia, serif" }}>Welcome</div>
            <div style={{ fontSize: 13, color: "#c3d3e6", marginTop: 8, fontWeight: 600 }}>Sign in to continue your training</div>
          </div>
            <div style={{ background: "#fff", padding: "32px 40px 40px" }}>
              <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                <button onClick={() => setRole("student")} style={{ flex: 1, padding: "14px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 900, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Student</button>
                <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "14px 0", background: role === "__tutor_pin" ? CRIMSON : "#fff", color: role === "__tutor_pin" ? "#fff" : NAVY, border: `2.5px solid ${role === "__tutor_pin" ? CRIMSON : NAVY}`, borderRadius: 8, fontWeight: 900, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
              </div>
              {role === "__tutor_pin" && (
              <div>
                <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
                  style={{ width: "100%", padding: "12px 14px", borderRadius: 7, border: `2.5px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif", fontWeight: 600 }}
                  onKeyDown={e => e.key === "Enter" && handleLogin("tutor")} />
                {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6, fontWeight: 700 }}>{pinError}</div>}
                <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "13px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 900, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter as Tutor</button>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // --- Student: find yourself by name (no list of other students shown) ---
  if (role === "student" && !studentId && !demoMode) {
    const trimmedQuery = nameQuery.trim().toLowerCase();
    const matchedStudent = trimmedQuery ? roster.find(s => s.name.trim().toLowerCase() === trimmedQuery) : null;
    const hasCloseMatches = trimmedQuery.length >= 2 && roster.some(s => s.name.trim().toLowerCase().includes(trimmedQuery));

    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ width: 440, borderRadius: 14, overflow: "hidden", boxShadow: "0 8px 40px rgba(26,58,92,0.18)" }}>
          <div style={{ background: NAVY, padding: "32px 36px 26px", textAlign: "center", borderBottom: `4px solid ${CRIMSON}` }}>
            <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 900, color: "#fff", fontFamily: "Lora, Georgia, serif" }}>Who's training?</div>
          </div>
          <div style={{ background: "#fff", padding: "28px 36px 32px" }}>
            {roster.length === 0 ? (
              <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", lineHeight: 1.6, marginBottom: 16, fontWeight: 600 }}>
                No students on the roster yet. Ask your tutor to add students in the Tutor Dashboard.
              </div>
            ) : (
              <div style={{ marginBottom: 16 }}>
                <input
                  type="text"
                  value={nameQuery}
                  onChange={e => setNameQuery(e.target.value)}
                  placeholder="Type your full name…"
                  autoFocus
                  onKeyDown={e => e.key === "Enter" && matchedStudent && setStudentId(matchedStudent.id)}
                  style={{ width: "100%", padding: "12px 14px", borderRadius: 8, border: `2.5px solid ${matchedStudent ? "#16a34a" : BORDER}`, fontSize: 15, fontWeight: 700, color: NAVY, boxSizing: "border-box", fontFamily: "Inter, sans-serif", outline: "none" }}
                />
                {matchedStudent ? (
                  <button onClick={() => setStudentId(matchedStudent.id)} style={{ width: "100%", marginTop: 10, padding: "12px 0", background: "#16a34a", color: "#fff", border: "none", borderRadius: 8, fontWeight: 900, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                    Continue as {matchedStudent.name} →
                  </button>
                ) : trimmedQuery && hasCloseMatches ? (
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 8, fontWeight: 600 }}>Keep typing your full name exactly as your tutor entered it.</div>
                ) : trimmedQuery ? (
                  <div style={{ fontSize: 12, color: CRIMSON, marginTop: 8, fontWeight: 700 }}>No match — check the spelling, or ask your tutor to confirm your name on the roster.</div>
                ) : (
                  <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 8, fontWeight: 600 }}>Type the exact name your tutor added you under.</div>
                )}
              </div>
            )}
            <button onClick={() => setDemoMode(true)} style={{ width: "100%", padding: "8px 0", background: "none", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Inter, sans-serif", textDecoration: "underline", fontWeight: 700 }}>
              Continue without saving (demo)
            </button>
          </div>
        </div>
      </div>
    );
  }

  // --- Tutor: haven't picked a student to preview yet ---
  if (role === "tutor" && !viewingStudentId) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: NAVY, padding: "36px 24px", textAlign: "center", borderBottom: `4px solid ${CRIMSON}` }}>
          <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
          <div style={{ fontSize: 26, fontWeight: 900, color: "#fff", fontFamily: "Lora, Georgia, serif" }}>Tutor tools</div>
        </div>
        <div style={{ maxWidth: 520, margin: "0 auto", padding: "32px 24px" }}>
          <button onClick={() => setActiveKey("tutor_dashboard")} style={{ width: "100%", padding: "18px 20px", background: CRIMSON, color: "#fff", border: "none", borderRadius: 10, fontWeight: 900, fontSize: 15, cursor: "pointer", fontFamily: "Inter, sans-serif", marginBottom: 24 }}>
            Open Tutor Dashboard →
          </button>
          <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 10 }}>Or preview a student's module map</div>
          {roster.length === 0 ? (
            <div style={{ fontSize: 13, color: "#64748b", fontWeight: 600 }}>No students on the roster yet — add some in the Tutor Dashboard.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {roster.map(s => (
                <button key={s.id} onClick={() => setViewingStudentId(s.id)} style={{ padding: "12px 16px", background: "#fff", border: `2.5px solid ${BORDER}`, borderRadius: 8, textAlign: "left", fontWeight: 800, fontSize: 14, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  {s.name}
                </button>
              ))}
            </div>
          )}
          <button onClick={logOut} style={{ marginTop: 24, width: "100%", padding: "8px 0", background: "none", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Inter, sans-serif", textDecoration: "underline", fontWeight: 700 }}>
            ← Log out
          </button>
        </div>
      </div>
    );
  }

  // --- Main dashboard: module map with live status ---
  const continueModule = findContinueModule();
  const displayName = role === "tutor"
    ? (roster.find(s => s.id === viewingStudentId) || {}).name
    : (demoMode ? "Demo" : (roster.find(s => s.id === studentId) || {}).name);

  const STATUS_BADGE = {
    passed: { icon: "✅", label: "Passed", color: "#16a34a" },
    in_progress: { icon: "🟡", label: "In progress", color: "#d97706" },
    not_started: { icon: "⚪", label: "Not started", color: "#94a3b8" },
  };

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif" }}>
      <div style={{ background: NAVY, borderBottom: `4px solid ${CRIMSON}`, padding: "36px 24px 32px" }}>
        <div style={{ maxWidth: 760, margin: "0 auto", display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 900, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>
              Analytical Training Hub
            </div>
            <div style={{ fontSize: 30, fontWeight: 900, color: "#fff", fontFamily: "Lora, Georgia, serif" }}>
              {role === "tutor" ? `Viewing: ${displayName}` : `Welcome back${displayName ? ", " + displayName : ""}`}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
            {role === "tutor" && (
              <button onClick={() => setViewingStudentId(null)} style={{ padding: "9px 16px", background: "rgba(255,255,255,0.08)", border: `2px solid rgba(255,255,255,0.35)`, borderRadius: 8, fontWeight: 800, fontSize: 12, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                Switch student
              </button>
            )}
            <button onClick={logOut} style={{ padding: "9px 16px", background: "rgba(255,255,255,0.08)", border: `2px solid rgba(255,255,255,0.35)`, borderRadius: 8, fontWeight: 800, fontSize: 12, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
              Log out
            </button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "28px 24px 60px" }}>
        {loadingProgress ? (
          <div style={{ fontSize: 13, color: "#64748b", padding: "16px 0", fontWeight: 700 }}>Loading progress…</div>
        ) : continueModule ? (
          <button
            onClick={() => setActiveKey(continueModule.key)}
            style={{ display: "block", width: "100%", textAlign: "left", padding: "20px 24px", background: CRIMSON, color: "#fff", border: "none", borderRadius: 12, marginBottom: 32, cursor: "pointer", fontFamily: "Inter, sans-serif" }}
          >

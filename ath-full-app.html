// Filler "prior stage" development sentences for the context strip, cycled across all 151
// prompts the same way SAMPLE_BP1_EXAMPLES was derived for the Development module (index-mapped,
// not hand-authored per-prompt, since this text is read-only context here, not graded).
function ATHBp1Concession() {
  const { useAuth, useRoster, useModuleProgress, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [concessionType, setConcessionType] = useState(null);
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);
  const [bankOpen, setBankOpen] = useState(false);

  const [timerMode, setTimerMode] = useState("countdown");
  const [timeLeft, setTimeLeft] = useState(90);
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerExpired, setTimerExpired] = useState(false);
  const timerRef = useRef(null);
  const textareaRef = useRef(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "bp1_conc";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const prompt = GRE_PROMPTS[promptIdx];
  const topicSentence = SAMPLE_BP1_TOPIC_SENTENCES[promptIdx];
  const exampleText = SAMPLE_BP1_EXAMPLES[promptIdx];
  const developmentText = SAMPLE_DEVELOPMENT[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);
  const typeConfig = concessionType ? CONCESSION_TYPES_BP1[concessionType] : null;
  const benchmarkTime = typeConfig ? typeConfig.benchmarkTime : 90;

  useEffect(() => {
    if (!timerRunning) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (timerMode === "countup") return prev + 1;
        if (prev <= 1) { clearInterval(timerRef.current); setTimerExpired(true); setTimerRunning(false); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [timerRunning, timerMode]);

  function startTimer() { setTimerRunning(true); }
  function resetTimer() {
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimeLeft(timerMode === "countup" ? 0 : benchmarkTime);
  }
  function switchTimerMode(mode) {
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimerMode(mode);
    setTimeLeft(mode === "countup" ? 0 : benchmarkTime);
  }

  function handleLogin(r) {
    login(r);
  }

  function selectType(key) {
    setConcessionType(key);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimeLeft(CONCESSION_TYPES_BP1[key].benchmarkTime);
  }

  function changeType() {
    setConcessionType(null);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function insertConnective(phrase) {
    setResponse(r => {
      if (!r) return phrase + " ";
      const needsSpace = !r.endsWith(" ") && !r.endsWith("\n");
      return r + (needsSpace ? " " : "") + phrase + " ";
    });
    if (textareaRef.current) textareaRef.current.focus();
    if (!timerRunning && !timerExpired) startTimer();
  }

  async function handleSubmit() {
    if (!typeConfig) return;
    if (!response.trim() || response.trim().split(/\s+/).length < typeConfig.minWords) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's CONCESSION for Body Paragraph I (the acknowledgment of a counterargument, followed by a rebuttal that returns to the student's position).

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Topic Sentence: "${topicSentence}"
Example: "${exampleText}"
Development: "${developmentText}"

The student selected: ${typeConfig.label}
Structural expectation for this type: ${typeConfig.detail}

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. concession_validity — Does the response acknowledge a genuine, reasonable counterargument (not a strawman or trivial objection)?
2. rebuttal_strength — Does the response decisively return to and reinforce the original position after conceding, rather than leaving the concession unanswered?
3. type_fit — Does the length and structure actually match the selected type? Type 1 should read as a compact closing move (1-2 sentences appended to the paragraph); Type 2 should read as a fully developed, self-contained paragraph with a clear concession-transition-rebuttal arc.
4. connective_language — Are concession/rebuttal signposting phrases used (admittedly, granted, nevertheless, even so, that said…)? This matters for e-rater scoring.
5. language_precision — Is the writing clear, grammatical, and academically precise?

Also provide:
- concession_move_detected: label the dominant move (e.g. "Full Concession + Strong Rebuttal", "Partial Concession", "Concession Without Rebuttal (weak)", "Strawman Concession (weak)", "Rebuttal Without Real Concession (weak)")
- connectives_used: array of the concession/rebuttal connective phrases actually found in the student's text (empty array if none)
- overall_score: sum of all 5 (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text
- rebuttal_note: 1 sentence on how well the rebuttal reinforces the original position, and how to strengthen it
- stronger_concession: a stronger version of the concession for this prompt, type, topic sentence, example, and development
- stronger_explanation: one sentence explaining what makes it stronger

Return ONLY valid JSON, no markdown:
{
  "concession_validity": <0-20>,
  "rebuttal_strength": <0-20>,
  "type_fit": <0-20>,
  "connective_language": <0-20>,
  "language_precision": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "concession_move_detected": "<label>",
  "connectives_used": ["<phrase>", ...],
  "coaching": "<text>",
  "rebuttal_note": "<text>",
  "stronger_concession": "<text>",
  "stronger_explanation": "<text>"
}`;

      const parsed = await scoreResponse(`Score this concession: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  const timerColor = timerMode === "benchmark" ? (timeLeft < 15 ? CRIMSON : timeLeft < 30 ? "#e07b00" : NAVY) : NAVY;
  const wordCount = response.trim().split(/\s+/).filter(Boolean).length;
  const minWords = typeConfig ? typeConfig.minWords : 0;

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Body Paragraph I</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Concession</div>
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <button onClick={() => setRole("student")} style={{ flex: 1, padding: "12px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Student</button>
            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
          </div>
          {role === "__tutor_pin" && (
            <div>
              <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
                style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif" }}
                onKeyDown={e => e.key === "Enter" && handleLogin("tutor")} />
              {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6 }}>{pinError}</div>}
              <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter as Tutor</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (role && !studentId && !demoMode) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "40px 36px", width: 400, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>Analytical Training Hub</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", textAlign: "center", marginBottom: 20 }}>Who's training?</div>
          {roster.length === 0 ? (
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", lineHeight: 1.6, marginBottom: 16 }}>
              No students on the roster yet. Ask your tutor to add students in the Tutor Dashboard.
            </div>
          ) : (

// 1:15 for topic sentence

function ATHBp2TopicSentence() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "bp2_ts";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_BP2_TS);

  const prompt = GRE_PROMPTS[promptIdx];
  const thesis = SAMPLE_THESES[promptIdx];
  const bp1TopicSentence = SAMPLE_BP1_TOPIC_SENTENCES[promptIdx];

  function handleLogin(selectedRole) {
    login(selectedRole);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 3) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's TOPIC SENTENCE for the SECOND body paragraph (Body Paragraph II) of an Issue essay.

The essay prompt is: "${prompt}"
The student's thesis is: "${thesis}"
Body Paragraph I's topic sentence (already written) is: "${bp1TopicSentence}"

Score the Body Paragraph II topic sentence on exactly these 5 criteria, each out of 20 points (total = 100):
1. claim_clarity — Is the paragraph's main argument stated clearly and specifically?
2. thesis_link — Does the topic sentence explicitly connect back to the essay's thesis?
3. distinct_point — Does this introduce a genuinely new supporting point, distinct from and non-overlapping with the Body Paragraph I topic sentence above? Flag it if the claim is a restatement or a minor variation of BP1's point.
4. transition_variety — Does the opening transition/connective phrase differ from the one used to open Body Paragraph I (shown above)? Reusing the same opening phrase should be penalized, since e-rater and human readers both reward varied signposting across paragraphs.
5. language — Is the language precise, academic, and free of vague hedging?

Also evaluate:
- topic_move_detected: a 2-4 word label naming the rhetorical move (e.g., "Direct Claim", "Transitional Pivot", "Scope Narrowing", "Contrast with BP1")
- overall_score: sum of all 5 criteria (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text, and referencing BP1's topic sentence if there is overlap or repeated phrasing
- stronger_example: a stronger version of the Body Paragraph II topic sentence for this prompt + thesis + BP1 topic sentence
- stronger_explanation: one sentence explaining what makes it better

Return ONLY valid JSON, no markdown, no preamble:
{
  "claim_clarity": <0-20>,
  "thesis_link": <0-20>,
  "distinct_point": <0-20>,
  "transition_variety": <0-20>,
  "language": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "topic_move_detected": "<label>",
  "coaching": "<feedback>",
  "stronger_example": "<sentence>",
  "stronger_explanation": "<one sentence>"
}`;

      const parsed = await scoreResponse(`Score this Body Paragraph II topic sentence: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();

  }

  const timerColor = timerMode === "benchmark"

  if (!role) {
    return (

            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Body Paragraph II</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Topic Sentence</div>
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <button onClick={() => setRole("student")} style={{ flex: 1, padding: "12px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>

            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
              Tutor
            </button>
          </div>
          {role === "__tutor_pin" && (
            <div>
              <input
                type="password"

              <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                Enter as Tutor
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (role && !studentId && !demoMode) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "40px 36px", width: 400, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>Analytical Training Hub</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", textAlign: "center", marginBottom: 20 }}>Who's training?</div>
          {roster.length === 0 ? (

          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16, maxHeight: 280, overflowY: "auto" }}>
              {roster.map(s => (

            Continue without saving (demo)
          </button>

      </div>

  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", display: "flex" }}>
      <div style={{

              {[0, 1, 2].map(i => (
                <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < consecutivePasses ? "#22c55e" : BORDER, border: `1px solid ${i < consecutivePasses ? "#16a34a" : BORDER}` }} />

            {role === "tutor" && !passed && (

            <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380, boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: NAVY, marginBottom: 12 }}>Tutor Override</div>
              <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Mark this student as having passed the Topic Sentence gate. Add an optional note.</div>
              <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Override note (optional)..." style={{ width: "100%", height: 80, padding: 10, borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 13, resize: "none", boxSizing: "border-box", fontFamily: "Inter, sans-serif" }} />
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button onClick={() => setOverrideMode(false)} style={{ flex: 1, padding: "10px 0", background: "#f1f5f9", border: "none", borderRadius: 7, fontWeight: 600, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Cancel</button>

              </div>
            </div>
          </div>

        {passed && (
          <div style={{ background: "#f0fdf4", borderBottom: "2px solid #22c55e", padding: "14px 28px", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 20 }}>✅</span>
            <div>
              <div style={{ fontWeight: 700, color: "#15803d", fontSize: 14 }}>Topic Sentence — Gate Cleared</div>
              <div style={{ fontSize: 12, color: "#166534" }}>3 consecutive passes at 80%+. Proceed to Example.</div>
            </div>
            <button onClick={newPrompt} style={{ marginLeft: "auto", padding: "8px 18px", background: NAVY, color: "#fff", border: "none", borderRadius: 7, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px", maxWidth: 820, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>

          <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "20px 24px", marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>GRE Issue Prompt</div>

            <button onClick={newPrompt} style={{ marginTop: 12, fontSize: 11, padding: "4px 10px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 5, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>

            </button>
          </div>

          <div style={{ background: "#fffbeb", border: `1px solid #fde68a`, borderRadius: 10, padding: "14px 20px", marginBottom: 12 }}>

            <div style={{ fontSize: 13, color: "#78350f", fontFamily: "Lora, Georgia, serif", lineHeight: 1.6 }}>{thesis}</div>
          </div>

          <div style={{ background: "#ecfeff", border: `1px solid #a5f3fc`, borderRadius: 10, padding: "14px 20px", marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#0e7490", textTransform: "uppercase", marginBottom: 6 }}>Body Paragraph I — Topic Sentence (for reference, so your point and phrasing don't overlap)</div>
            <div style={{ fontSize: 13, color: "#155e75", fontFamily: "Lora, Georgia, serif", lineHeight: 1.6 }}>{bp1TopicSentence}</div>
          </div>

          <div style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 4 }}>Write your Body Paragraph II topic sentence</div>
            <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.6 }}>
              Open your second body paragraph with a single sentence that (1) launches with a transitional phrase different from the one used above in Body Paragraph I, (2) states a specific, arguable claim that is a genuinely separate supporting point, and (3) links explicitly to your thesis.
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
            <div style={{ fontSize: 28, fontWeight: 700, color: timerColor, fontVariantNumeric: "tabular-nums", minWidth: 72 }}>
              {formatTime(timeLeft)}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={startTimer} disabled={timerRunning} style={{ fontSize: 11, padding: "4px 10px", background: timerRunning ? "#f1f5f9" : NAVY, color: timerRunning ? "#94a3b8" : "#fff", border: "none", borderRadius: 5, cursor: timerRunning ? "default" : "pointer", fontFamily: "Inter, sans-serif" }}>Start</button>
              <button onClick={resetTimer} style={{ fontSize: 11, padding: "4px 10px", background: "#f1f5f9", border: `1px solid ${BORDER}`, borderRadius: 5, cursor: "pointer", color: "#64748b", fontFamily: "Inter, sans-serif" }}>Reset</button>

            {role === "tutor" && (
              <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>
                {TIMER_MODES.map(m => (
                  <button key={m} onClick={() => switchTimerMode(m)} style={{ fontSize: 10, padding: "3px 8px", background: timerMode === m ? NAVY : "#fff", color: timerMode === m ? "#fff" : "#64748b", border: `1px solid ${BORDER}`, borderRadius: 4, cursor: "pointer", fontFamily: "Inter, sans-serif", textTransform: "capitalize" }}>
                    {m}
                  </button>
                ))}
              </div>
            )}
            {timerExpired && <span style={{ fontSize: 11, color: CRIMSON, fontWeight: 600 }}>Time's up</span>}
          </div>

          {!submitted ? (
            <div>
              <textarea
                value={response}
                onChange={e => setResponse(e.target.value)}
                placeholder="Begin with a transitional phrase different from Body Paragraph I — e.g., 'A second, equally compelling consideration is…' or 'Beyond this, the evidence also shows…'"
                style={{ width: "100%", height: 90, padding: "14px 16px", borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 14, lineHeight: 1.7, resize: "none", boxSizing: "border-box", fontFamily: "Lora, Georgia, serif", color: "#1e293b", outline: "none" }}
                onFocus={e => { if (!timerRunning && !timerExpired) startTimer(); e.target.style.borderColor = NAVY; }}
                onBlur={e => e.target.style.borderColor = BORDER}
              />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>{response.trim().split(/\s+/).filter(Boolean).length} words</div>
                <button
                  onClick={handleSubmit}
                  disabled={response.trim().split(/\s+/).length < 3}
                  style={{ padding: "10px 28px", background: response.trim().split(/\s+/).length >= 3 ? CRIMSON : "#e2e8f0", color: response.trim().split(/\s+/).length >= 3 ? "#fff" : "#94a3b8", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: response.trim().split(/\s+/).length >= 3 ? "pointer" : "default", fontFamily: "Inter, sans-serif" }}
                >
                  Score →
                </button>
              </div>
            </div>
          ) : scoring ? (
            <div style={{ padding: "32px 0", textAlign: "center", color: "#64748b", fontSize: 13 }}>
              <div style={{ fontSize: 24, marginBottom: 12 }}>⏳</div>
              Scoring your topic sentence…
            </div>
          ) : scoreData?.error ? (
            <div style={{ padding: 20, color: CRIMSON, fontSize: 13 }}>Scoring failed. <button onClick={tryAgain} style={{ color: NAVY, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Try again</button></div>
          ) : scoreData && (
            <div>
              <div style={{ background: "#f8fafc", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 6 }}>Your sentence · {scoreData.topic_move_detected}</div>
                <div style={{ fontSize: 14, color: "#1e293b", fontFamily: "Lora, Georgia, serif", lineHeight: 1.65 }}>{response}</div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, padding: "16px 20px", background: scoreData.passed ? "#f0fdf4" : "#fff7f7", borderRadius: 10, border: `1px solid ${scoreData.passed ? "#bbf7d0" : "#fecaca"}` }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 800, color: scoreData.passed ? "#16a34a" : CRIMSON, lineHeight: 1 }}>{scoreData.overall_score}</div>
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>/ 100</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: scoreData.passed ? "#15803d" : CRIMSON }}>{scoreData.passed ? "Pass ✓" : "Not yet — keep going"}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>
                    {scoreData.passed ? `Pass streak: ${consecutivePasses}/3` : `Need 80+ to pass · Streak resets`}
                  </div>
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                {CRITERIA_BP2_TS.map(c => (
                  <div key={c.key} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: NAVY }}>{c.label}</span>
                      <span style={{ fontSize: 12, color: scoreData[c.key] >= 16 ? "#16a34a" : scoreData[c.key] >= 12 ? "#d97706" : CRIMSON, fontWeight: 700 }}>{scoreData[c.key]}/20</span>
                    </div>
                    <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(scoreData[c.key] / 20) * 100}%`, background: scoreData[c.key] >= 16 ? "#22c55e" : scoreData[c.key] >= 12 ? "#f59e0b" : CRIMSON, borderRadius: 3, transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{c.desc}</div>
                  </div>
                ))}
              </div>

              <div style={{ background: "#eff6ff", border: `1px solid #bfdbfe`, borderRadius: 8, padding: "14px 18px", marginBottom: 16 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#1d4ed8", textTransform: "uppercase", marginBottom: 6 }}>Coaching</div>
                <div style={{ fontSize: 13, color: "#1e3a5f", lineHeight: 1.7 }}>{scoreData.coaching}</div>
              </div>

              <div style={{ background: "#f0fdf4", border: `1px solid #bbf7d0`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#15803d", textTransform: "uppercase", marginBottom: 6 }}>Stronger Example</div>
                <div style={{ fontSize: 13, color: "#14532d", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7, marginBottom: 8 }}>{scoreData.stronger_example}</div>
                <div style={{ fontSize: 11, color: "#166534", borderTop: "1px solid #bbf7d0", paddingTop: 8 }}>{scoreData.stronger_explanation}</div>
              </div>

              {attempts.length > 1 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Attempt History</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {attempts.map((a, i) => (
                      <div key={i} style={{ padding: "4px 10px", borderRadius: 20, background: a.passed ? "#f0fdf4" : "#fff7f7", border: `1px solid ${a.passed ? "#bbf7d0" : "#fecaca"}`, fontSize: 12, fontWeight: 600, color: a.passed ? "#15803d" : CRIMSON }}>
                        #{i + 1} — {a.overall_score}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  Try Again
                </button>
                <button onClick={newPrompt} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  New Prompt
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


function ATHBp2Example() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [selectedExampleType, setSelectedExampleType] = useState(null);
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "bp2_ex";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const { timerMode, timeLeft, timerRunning, timerExpired, startTimer, resetTimer, switchTimerMode } = useBenchmarkTimer(BENCHMARK_TIME_BP2_EX);

  const prompt = GRE_PROMPTS[promptIdx];
  const bp2TopicSentence = SAMPLE_BP2_TOPIC_SENTENCES[promptIdx];
  const bp1Example = SAMPLE_BP1_EXAMPLES[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);

  function handleLogin(r) {
    login(r);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    setSelectedExampleType(null);
    resetTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 8) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's EXAMPLE sentence(s) for Body Paragraph II.

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Body Paragraph II Topic Sentence: "${bp2TopicSentence}"
Body Paragraph I's example (already used earlier in the essay): "${bp1Example}"
Example type declared by student: "${selectedExampleType || "Not declared"}"

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. relevance — Does the example directly illustrate the Body Paragraph II topic sentence claim?
2. specificity — Is the example concrete and specific (names, events, data, dates) rather than vague?
3. accuracy — Is the example factually plausible and presented accurately?
4. integration — Is the example smoothly introduced and connected to the claim?
5. depth — Does the example have enough detail to be persuasive without over-explaining?

Also provide:
- example_type_detected: what type of example this actually is
- reused_bp1_example: true if this example is the same as, or a trivial variation of, the Body Paragraph I example shown above (same person/event/institution/domain); false if it is a genuinely different example
- overall_score: sum of all 5 (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text. If reused_bp1_example is true, explicitly say so and suggest a different domain.
- specificity_note: 1 sentence on what specific detail could strengthen this example
- stronger_example: a stronger version of the example for this prompt + topic sentence, drawn from a different domain than the Body Paragraph I example
- stronger_explanation: one sentence explaining what makes it stronger

Return ONLY valid JSON, no markdown:
{
  "relevance": <0-20>,
  "specificity": <0-20>,
  "accuracy": <0-20>,
  "integration": <0-20>,
  "depth": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "example_type_detected": "<label>",
  "reused_bp1_example": <boolean>,
  "coaching": "<text>",
  "specificity_note": "<text>",
  "stronger_example": "<text>",
  "stronger_explanation": "<text>"
}`;

      const parsed = await scoreResponse(`Score this example: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  const timerColor = timerMode === "benchmark" ? (timeLeft < 15 ? CRIMSON : timeLeft < 30 ? "#e07b00" : NAVY) : NAVY;

  if (!role) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "48px 40px", width: 380, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>Analytical Training Hub</div>
            <div style={{ fontSize: 22, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif" }}>Body Paragraph II</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 6 }}>Example</div>
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
            <button onClick={() => setRole("student")} style={{ flex: 1, padding: "12px 0", background: NAVY, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Student</button>
            <button onClick={() => setRole("__tutor_pin")} style={{ flex: 1, padding: "12px 0", background: "#fff", color: NAVY, border: `2px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Tutor</button>
          </div>
          {role === "__tutor_pin" && (
            <div>
              <input type="password" placeholder="Tutor PIN" value={pin} onChange={e => { setPin(e.target.value); setPinError(""); }}
                style={{ width: "100%", padding: "10px 12px", borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 14, marginBottom: 8, boxSizing: "border-box", fontFamily: "Inter, sans-serif" }}
                onKeyDown={e => e.key === "Enter" && handleLogin("tutor")} />
              {pinError && <div style={{ color: CRIMSON, fontSize: 12, marginBottom: 6 }}>{pinError}</div>}
              <button onClick={() => handleLogin("tutor")} style={{ width: "100%", padding: "11px 0", background: CRIMSON, color: "#fff", border: "none", borderRadius: 8, fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Enter as Tutor</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (role && !studentId && !demoMode) {
    return (
      <div style={{ minHeight: "100vh", background: LIGHT_BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "40px 36px", width: 400, boxShadow: "0 4px 24px rgba(26,58,92,0.10)", border: `1px solid ${BORDER}` }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 8, textAlign: "center" }}>Analytical Training Hub</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: NAVY, fontFamily: "Lora, Georgia, serif", textAlign: "center", marginBottom: 20 }}>Who's training?</div>
          {roster.length === 0 ? (
            <div style={{ fontSize: 13, color: "#64748b", textAlign: "center", lineHeight: 1.6, marginBottom: 16 }}>
              No students on the roster yet. Ask your tutor to add students in the Tutor Dashboard.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16, maxHeight: 280, overflowY: "auto" }}>
              {roster.map(s => (
                <button key={s.id} onClick={() => setStudentId(s.id)} style={{ padding: "10px 14px", background: "#fff", border: `1.5px solid ${BORDER}`, borderRadius: 8, textAlign: "left", fontWeight: 600, fontSize: 13.5, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>
                  {s.name}
                </button>
              ))}
            </div>
          )}
          <button onClick={() => setDemoMode(true)} style={{ width: "100%", padding: "8px 0", background: "none", border: "none", color: "#94a3b8", fontSize: 11, cursor: "pointer", fontFamily: "Inter, sans-serif", textDecoration: "underline" }}>
            Continue without saving (demo)
          </button>
        </div>
      </div>
    );
  }


  return (
    <div style={{ minHeight: "100vh", background: LIGHT_BG, fontFamily: "Inter, sans-serif", display: "flex" }}>
      <div style={{ width: sidebarOpen ? 240 : 0, minWidth: sidebarOpen ? 240 : 0, background: NAVY, color: "#fff", transition: "width 0.25s, min-width 0.25s", overflow: "hidden", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "28px 20px 16px", borderBottom: "1px solid rgba(255,255,255,0.10)" }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 3, color: CRIMSON, textTransform: "uppercase", marginBottom: 4 }}>ATH</div>
          <div style={{ fontSize: 15, fontWeight: 700, fontFamily: "Lora, Georgia, serif" }}>Analytical Training Hub</div>
        </div>
        <div style={{ padding: "16px 0", flex: 1 }}>
          {[
            { label: "Introduction", sub: ["Hook ✓", "Shift to Prompt ✓", "Thesis ✓", "Outline ✓"], done: true },
            { label: "Body Paragraph I", sub: ["Topic Sentence ✓", "Example ✓", "Development ✓", "Concession ✓"], done: true },
            { label: "Body Paragraph II", sub: ["Topic Sentence ✓", "Example ←", "Development", "Concession"], done: false },
            { label: "Conclusion", sub: [], locked: true },
          ].map((section, i) => (
            <div key={i} style={{ marginBottom: 2 }}>
              <div style={{ padding: "8px 20px", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: section.locked ? "rgba(255,255,255,0.25)" : section.done ? "#7ec8a0" : "rgba(255,255,255,0.9)" }}>
                {section.locked ? "🔒 " : section.done ? "✓ " : ""}{section.label}
              </div>
              {(section.sub || []).map((s, j) => (
                <div key={j} style={{ padding: "5px 20px 5px 32px", fontSize: 12, color: s.includes("←") ? "#fbbf24" : s.includes("✓") ? "rgba(255,255,255,0.45)" : "rgba(255,255,255,0.35)" }}>
                  {s.replace(" ←", "")}{s.includes("←") && <span style={{ color: "#fbbf24", marginLeft: 4 }}>◀</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div style={{ padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.10)", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>
          {role === "tutor" ? "👤 Tutor" : "👤 Student"}{studentId && !demoMode ? ` — ${(roster.find(s => s.id === studentId) || {}).name || ""}` : demoMode ? " — Demo" : ""}
        </div>
      </div>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        <div style={{ background: "#fff", borderBottom: `1px solid ${BORDER}`, padding: "0 24px", height: 52, display: "flex", alignItems: "center", gap: 16, flexShrink: 0 }}>
          <button onClick={() => setSidebarOpen(o => !o)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: NAVY, padding: 4 }}>☰</button>
          <div style={{ fontSize: 12, color: "#64748b" }}>
            <span style={{ color: NAVY, fontWeight: 600 }}>Body Paragraph II</span>
            <span style={{ margin: "0 6px" }}>›</span>
            <span style={{ color: CRIMSON, fontWeight: 600 }}>Example</span>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < consecutivePasses ? "#22c55e" : BORDER, border: `1px solid ${i < consecutivePasses ? "#16a34a" : BORDER}` }} />
              ))}
              <span style={{ fontSize: 11, color: "#64748b", marginLeft: 4 }}>Pass streak</span>
            </div>
            {role === "tutor" && !passed && (
              <button onClick={() => setOverrideMode(true)} style={{ fontSize: 11, padding: "4px 10px", background: "#fff7ed", border: `1px solid #f59e0b`, borderRadius: 5, color: "#b45309", fontWeight: 600, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Override</button>
            )}
          </div>
        </div>

        {overrideMode && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <div style={{ background: "#fff", borderRadius: 12, padding: 32, width: 380, boxShadow: "0 8px 40px rgba(0,0,0,0.18)" }}>
              <div style={{ fontWeight: 700, fontSize: 15, color: NAVY, marginBottom: 12 }}>Tutor Override</div>
              <div style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Mark this student as having passed the Example gate.</div>
              <textarea value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Override note (optional)…" style={{ width: "100%", height: 80, padding: 10, borderRadius: 7, border: `1px solid ${BORDER}`, fontSize: 13, resize: "none", boxSizing: "border-box", fontFamily: "Inter, sans-serif" }} />
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button onClick={() => setOverrideMode(false)} style={{ flex: 1, padding: "10px 0", background: "#f1f5f9", border: "none", borderRadius: 7, fontWeight: 600, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Cancel</button>
                <button onClick={tutorOverride} style={{ flex: 1, padding: "10px 0", background: CRIMSON, border: "none", borderRadius: 7, fontWeight: 600, color: "#fff", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Confirm Override</button>
              </div>
            </div>
          </div>
        )}

        {passed && (
          <div style={{ background: "#f0fdf4", borderBottom: "2px solid #22c55e", padding: "14px 28px", display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ fontSize: 20 }}>✅</span>
            <div>
              <div style={{ fontWeight: 700, color: "#15803d", fontSize: 14 }}>Example — Gate Cleared</div>
              <div style={{ fontSize: 12, color: "#166534" }}>3 consecutive passes at 80%+. Proceed to Development.</div>
            </div>
            <button onClick={newPrompt} style={{ marginLeft: "auto", padding: "8px 18px", background: NAVY, color: "#fff", border: "none", borderRadius: 7, fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Next: Development →</button>
          </div>
        )}

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px", maxWidth: 820, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>

          <div style={{ background: "#fff", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "20px 24px", marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: CRIMSON, textTransform: "uppercase", marginBottom: 8 }}>GRE Issue Prompt</div>
            <div style={{ fontSize: 14, color: NAVY, lineHeight: 1.7, fontFamily: "Lora, Georgia, serif", marginBottom: 12 }}>{prompt}</div>
            <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.65, borderTop: `1px solid ${BORDER}`, paddingTop: 12 }}>{taskInstruction}</div>
            <button onClick={newPrompt} style={{ marginTop: 12, fontSize: 11, padding: "4px 10px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 5, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New prompt ↺</button>
          </div>

          <div style={{ background: "#fffbeb", border: `1px solid #fde68a`, borderRadius: 10, padding: "14px 20px", marginBottom: 12 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#92400e", textTransform: "uppercase", marginBottom: 6 }}>Topic Sentence (from BP2 Topic Sentence)</div>
            <div style={{ fontSize: 13, color: "#78350f", fontFamily: "Lora, Georgia, serif", lineHeight: 1.65 }}>{bp2TopicSentence}</div>
          </div>

          <div style={{ background: "#eff6ff", border: `1px solid #bfdbfe`, borderRadius: 10, padding: "14px 20px", marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#1d4ed8", textTransform: "uppercase", marginBottom: 6 }}>Body Paragraph I — Example (for reference, so you don't reuse it)</div>
            <div style={{ fontSize: 13, color: "#1e3a8a", fontFamily: "Lora, Georgia, serif", lineHeight: 1.65 }}>{bp1Example}</div>
          </div>

          {!submitted && (
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 8 }}>What type of example are you using? <span style={{ fontSize: 12, fontWeight: 400, color: "#94a3b8" }}>(optional)</span></div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                {EXAMPLE_TYPES.map(t => (
                  <button key={t} onClick={() => setSelectedExampleType(selectedExampleType === t ? null : t)}
                    style={{ padding: "6px 14px", borderRadius: 20, border: `1.5px solid ${selectedExampleType === t ? NAVY : BORDER}`, background: selectedExampleType === t ? NAVY : "#fff", color: selectedExampleType === t ? "#fff" : "#64748b", fontWeight: 500, fontSize: 12, cursor: "pointer", fontFamily: "Inter, sans-serif", transition: "all 0.15s" }}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
          )}

          {!submitted && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 4 }}>Write your example</div>
              <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.65 }}>
                Introduce a specific, concrete example that directly illustrates the claim in your Body Paragraph II topic sentence — from a different domain than the Body Paragraph I example shown above. Name real people, institutions, events, or data where possible. Aim for 2–4 sentences.
              </div>
            </div>
          )}

          {!submitted && (
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 28, fontWeight: 700, color: timerColor, fontVariantNumeric: "tabular-nums", minWidth: 72 }}>{formatTime(timeLeft)}</div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={startTimer} disabled={timerRunning} style={{ fontSize: 11, padding: "4px 10px", background: timerRunning ? "#f1f5f9" : NAVY, color: timerRunning ? "#94a3b8" : "#fff", border: "none", borderRadius: 5, cursor: timerRunning ? "default" : "pointer", fontFamily: "Inter, sans-serif" }}>Start</button>
                <button onClick={resetTimer} style={{ fontSize: 11, padding: "4px 10px", background: "#f1f5f9", border: `1px solid ${BORDER}`, borderRadius: 5, cursor: "pointer", color: "#64748b", fontFamily: "Inter, sans-serif" }}>Reset</button>
              </div>
              {role === "tutor" && (
                <div style={{ display: "flex", gap: 4, marginLeft: 8 }}>
                  {["countdown", "countup", "benchmark"].map(m => (
                    <button key={m} onClick={() => switchTimerMode(m)} style={{ fontSize: 10, padding: "3px 8px", background: timerMode === m ? NAVY : "#fff", color: timerMode === m ? "#fff" : "#64748b", border: `1px solid ${BORDER}`, borderRadius: 4, cursor: "pointer", fontFamily: "Inter, sans-serif", textTransform: "capitalize" }}>{m}</button>
                  ))}
                </div>
              )}
              {timerExpired && <span style={{ fontSize: 11, color: CRIMSON, fontWeight: 600 }}>Time's up</span>}
            </div>
          )}

          {!submitted ? (
            <div>
              <textarea value={response} onChange={e => setResponse(e.target.value)}
                placeholder="Name a specific person, event, institution, or statistic that directly supports your Body Paragraph II claim…"
                style={{ width: "100%", height: 130, padding: "14px 16px", borderRadius: 8, border: `1.5px solid ${BORDER}`, fontSize: 14, lineHeight: 1.75, resize: "none", boxSizing: "border-box", fontFamily: "Lora, Georgia, serif", color: "#1e293b", outline: "none" }}
                onFocus={e => { if (!timerRunning && !timerExpired) startTimer(); e.target.style.borderColor = NAVY; }}
                onBlur={e => e.target.style.borderColor = BORDER} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>{response.trim().split(/\s+/).filter(Boolean).length} words</div>
                <button onClick={handleSubmit} disabled={response.trim().split(/\s+/).length < 8}
                  style={{ padding: "10px 28px", background: response.trim().split(/\s+/).length >= 8 ? CRIMSON : "#e2e8f0", color: response.trim().split(/\s+/).length >= 8 ? "#fff" : "#94a3b8", border: "none", borderRadius: 8, fontWeight: 700, fontSize: 14, cursor: response.trim().split(/\s+/).length >= 8 ? "pointer" : "default", fontFamily: "Inter, sans-serif" }}>
                  Score →
                </button>
              </div>
            </div>
          ) : scoring ? (
            <div style={{ padding: "32px 0", textAlign: "center", color: "#64748b", fontSize: 13 }}>
              <div style={{ fontSize: 24, marginBottom: 12 }}>⏳</div>
              Scoring your example…
            </div>
          ) : scoreData?.error ? (
            <div style={{ padding: 20, color: CRIMSON, fontSize: 13 }}>Scoring failed. <button onClick={tryAgain} style={{ color: NAVY, fontWeight: 600, background: "none", border: "none", cursor: "pointer" }}>Try again</button></div>
          ) : scoreData && (
            <div>
              <div style={{ background: "#f8fafc", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#64748b", textTransform: "uppercase", marginBottom: 6 }}>
                  Your example · {scoreData.example_type_detected}
                  {selectedExampleType && selectedExampleType !== scoreData.example_type_detected && (
                    <span style={{ marginLeft: 8, color: "#f59e0b" }}>(declared: {selectedExampleType})</span>
                  )}
                  {scoreData.reused_bp1_example && (
                    <span style={{ marginLeft: 8, color: CRIMSON }}>(⚠ resembles your BP1 example)</span>
                  )}
                </div>
                <div style={{ fontSize: 14, color: "#1e293b", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7 }}>{response}</div>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, padding: "16px 20px", background: scoreData.passed ? "#f0fdf4" : "#fff7f7", borderRadius: 10, border: `1px solid ${scoreData.passed ? "#bbf7d0" : "#fecaca"}` }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 38, fontWeight: 800, color: scoreData.passed ? "#16a34a" : CRIMSON, lineHeight: 1 }}>{scoreData.overall_score}</div>
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>/ 100</div>
                </div>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15, color: scoreData.passed ? "#15803d" : CRIMSON }}>{scoreData.passed ? "Pass ✓" : "Not yet — keep going"}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{scoreData.passed ? `Pass streak: ${consecutivePasses}/3` : "Need 80+ to pass · Streak resets"}</div>
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                {CRITERIA_BP2_EX.map(c => (
                  <div key={c.key} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: NAVY }}>{c.label}</span>
                      <span style={{ fontSize: 12, color: scoreData[c.key] >= 16 ? "#16a34a" : scoreData[c.key] >= 12 ? "#d97706" : CRIMSON, fontWeight: 700 }}>{scoreData[c.key]}/20</span>
                    </div>
                    <div style={{ height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(scoreData[c.key] / 20) * 100}%`, background: scoreData[c.key] >= 16 ? "#22c55e" : scoreData[c.key] >= 12 ? "#f59e0b" : CRIMSON, borderRadius: 3, transition: "width 0.6s ease" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{c.desc}</div>

              <div style={{ background: "#f0fdf4", border: `1px solid #bbf7d0`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>

                <div style={{ fontSize: 13, color: "#14532d", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7, marginBottom: 8 }}>{scoreData.stronger_example}</div>
                <div style={{ fontSize: 11, color: "#166534", borderTop: "1px solid #bbf7d0", paddingTop: 8 }}>{scoreData.stronger_explanation}</div>
              </div>

              {attempts.length > 1 && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8 }}>Attempt History</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {attempts.map((a, i) => (
                      <div key={i} style={{ padding: "4px 10px", borderRadius: 20, background: a.passed ? "#f0fdf4" : "#fff7f7", border: `1px solid ${a.passed ? "#bbf7d0" : "#fecaca"}`, fontSize: 12, fontWeight: 600, color: a.passed ? "#15803d" : CRIMSON }}>
                        #{i + 1} — {a.overall_score}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={tryAgain} style={{ padding: "10px 24px", background: "#fff", border: `1.5px solid ${NAVY}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: NAVY, cursor: "pointer", fontFamily: "Inter, sans-serif" }}>Try Again</button>
                <button onClick={newPrompt} style={{ padding: "10px 24px", background: LIGHT_BG, border: `1px solid ${BORDER}`, borderRadius: 8, fontWeight: 600, fontSize: 13, color: "#64748b", cursor: "pointer", fontFamily: "Inter, sans-serif" }}>New Prompt</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


// Filler "prior stage" text for context strips, cycled across all 151 prompts the same way
// SAMPLE_EXAMPLES was derived in the Development module (index-mapped, read-only context here).
function ATHBp2Development() {
  const { useAuth, useRoster, useModuleProgress, useBenchmarkTimer, scoreResponse } = window.ATHCore;

  const { role, setRole, pin, setPin, pinError, setPinError, login } = useAuth();
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [promptIdx, setPromptIdx] = useState(() => Math.floor(Math.random() * GRE_PROMPTS.length));
  const [response, setResponse] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [scoring, setScoring] = useState(false);
  const [scoreData, setScoreData] = useState(null);
  const [bankOpen, setBankOpen] = useState(false);

  const [timerMode, setTimerMode] = useState("countdown");
  const [timeLeft, setTimeLeft] = useState(BENCHMARK_TIME_BP2_DEV);
  const [timerRunning, setTimerRunning] = useState(false);
  const [timerExpired, setTimerExpired] = useState(false);
  const timerRef = useRef(null);
  const textareaRef = useRef(null);

  const [overrideMode, setOverrideMode] = useState(false);
  const [noteText, setNoteText] = useState("");

  // --- roster / persistence ---
  const MODULE_KEY = "bp2_dev";
  const { roster, studentId, setStudentId, demoMode, setDemoMode } = useRoster();
  const { consecutivePasses, passed, attempts, recordAttempt, tutorOverride: doOverride } = useModuleProgress(studentId, MODULE_KEY, demoMode, { passField: "passed", scoreField: "overall_score", capAtThree: false });

  const prompt = GRE_PROMPTS[promptIdx];
  const topicSentence = SAMPLE_BP2_TOPIC_SENTENCES[promptIdx];
  const exampleText = SAMPLE_BP2_EXAMPLES[promptIdx];
  const taskInstruction = getTaskInstruction(promptIdx);

  useEffect(() => {
    if (!timerRunning) return;
    timerRef.current = setInterval(() => {
      setTimeLeft(prev => {
        if (timerMode === "countup") return prev + 1;
        if (prev <= 1) { clearInterval(timerRef.current); setTimerExpired(true); setTimerRunning(false); return 0; }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [timerRunning, timerMode]);

  function startTimer() { setTimerRunning(true); }
  function resetTimer() {
    clearInterval(timerRef.current);
    setTimerRunning(false);
    setTimerExpired(false);
    setTimeLeft(timerMode === "countup" ? 0 : BENCHMARK_TIME_BP2_DEV);
  }
  function switchTimerMode(mode) {
    resetTimer();
    setTimerMode(mode);
    setTimeLeft(mode === "countup" ? 0 : BENCHMARK_TIME_BP2_DEV);
  }

  function handleLogin(r) {
    login(r);
  }

  function newPrompt() {
    let idx;
    do { idx = Math.floor(Math.random() * GRE_PROMPTS.length); } while (idx === promptIdx);
    setPromptIdx(idx);
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function insertConnective(phrase) {
    setResponse(r => {
      if (!r) return phrase + " ";
      const needsSpace = !r.endsWith(" ") && !r.endsWith("\n");
      return r + (needsSpace ? " " : "") + phrase + " ";
    });
    if (textareaRef.current) textareaRef.current.focus();
    if (!timerRunning && !timerExpired) startTimer();
  }

  async function handleSubmit() {
    if (!response.trim() || response.trim().split(/\s+/).length < 15) return;
    setScoring(true);
    setSubmitted(true);

    try {
      const systemPrompt = `You are an expert GRE Analytical Writing coach scoring a student's DEVELOPMENT sentences (the analysis that follows an example) for Body Paragraph II.

GRE Prompt: "${prompt}"
Task: "${taskInstruction}"
Body Paragraph II Topic Sentence: "${topicSentence}"
Body Paragraph II Example: "${exampleText}"

The student's development should analyse the example — explain WHY it proves the topic sentence claim — and explicitly link back to the claim. It should NOT introduce a new example or merely re-describe the existing one.

Score on exactly these 5 criteria, each out of 20 (total = 100):
1. analytical_depth — Does the analysis explain WHY the example supports the claim (mechanism, cause, implication) rather than restating or summarising it?
2. claim_linkage — Does the analysis explicitly connect back to the topic sentence claim and, ideally, the broader position?
3. reasoning_chain — Is the logical progression sound and complete (no leaps, no circularity)?
4. connective_language — Are connective/transition phrases used to signpost the reasoning (consequently, therefore, this demonstrates that, it follows that…)? This matters for e-rater scoring.
5. language_precision — Is the writing clear, grammatical, and academically precise?

Also provide:
- analytical_move_detected: label the dominant analytical move (e.g. "Causal Mechanism", "Implication Drawing", "Generalisation", "Contrast Amplification", "Counterfactual Reasoning", "Restatement (weak)")
- connectives_used: array of the connective/transition phrases actually found in the student's text (empty array if none)
- overall_score: sum of all 5 (0-100)
- passed: true if overall_score >= 80
- coaching: 2-3 sentences of specific, actionable feedback referencing the actual text
- linkage_note: 1 sentence on how well the analysis ties back to the topic sentence claim, and how to tighten the link
- stronger_development: a stronger version of the development for this prompt + topic sentence + example
- stronger_explanation: one sentence explaining what makes it stronger

Return ONLY valid JSON, no markdown:
{
  "analytical_depth": <0-20>,
  "claim_linkage": <0-20>,
  "reasoning_chain": <0-20>,
  "connective_language": <0-20>,
  "language_precision": <0-20>,
  "overall_score": <0-100>,
  "passed": <boolean>,
  "analytical_move_detected": "<label>",
  "connectives_used": ["<phrase>", ...],
  "coaching": "<text>",
  "linkage_note": "<text>",
  "stronger_development": "<text>",
  "stronger_explanation": "<text>"
}`;

      const parsed = await scoreResponse(`Score this development: "${response}"`, systemPrompt);
      setScoreData(parsed);
      recordAttempt(parsed, response);
    } catch (e) {
      setScoreData({ error: true });
    }
    setScoring(false);
  }

  function tryAgain() {
    setResponse("");
    setSubmitted(false);
    setScoreData(null);
    resetTimer();
  }

  function tutorOverride() {
    doOverride();
    setOverrideMode(false);
  }

  const timerColor = timerMode === "benchmark" ? (timeLeft < 15 ? CRIMSON : timeLeft < 30 ? "#e07b00" : NAVY) : NAVY;
  const wordCount = response.trim().split(/\s+/).filter(Boolean).length;

  if (!role) {

                onFocus={e => { if (!timerRunning && !timerExpired) startTimer(); e.target.style.borderColor = NAVY; }}

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 10 }}>

                </button>
              </div>

              <div style={{ fontSize: 24, marginBottom: 12 }}>⏳</div>

          ) : scoreData && (
            <div>
              <div style={{ background: "#f8fafc", border: `1px solid ${BORDER}`, borderRadius: 8, padding: "12px 16px", marginBottom: 20 }}>

                  Your development · {scoreData.analytical_move_detected}

                <div style={{ fontSize: 14, color: "#1e293b", fontFamily: "Lora, Georgia, serif", lineHeight: 1.7 }}>{response}</div>
                {Array.isArray(scoreData.connectives_used) && scoreData.connectives_used.length > 0 && (
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 10, borderTop: `1px solid ${BORDER}`, paddingTop: 10 }}>
                    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: "#64748b", textTransform: "uppercase", alignSelf: "center" }}>Connectives found:</span>
                    {scoreData.connectives_used.map((c, i) => (

                    ))}
